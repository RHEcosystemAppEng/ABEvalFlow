apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline
  namespace: ab-eval-flow
  labels:
    app.kubernetes.io/part-of: abevalflow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-image-builder
  namespace: ab-eval-flow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-builder
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: ab-eval-flow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pipeline-trial-manager
  namespace: ab-eval-flow
rules:
  # Pod management for Harbor trial pods and AEH KubernetesEnvironment
  # AEH uses: create_namespaced_pod, read_namespaced_pod, delete_namespaced_pod
  - apiGroups: [""]
    resources: [pods]
    verbs: [create, get, list, watch, delete]
  # Pod exec for Harbor/AEH to run commands in trial pods
  # AEH uses: connect_get_namespaced_pod_exec
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [""]
    resources: [events]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
    resourceNames: [ab-eval-db-credentials, litellm-credentials, minio-credentials, github-token, llm-credentials]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list, create, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-trial-manager
  namespace: ab-eval-flow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pipeline-trial-manager
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: ab-eval-flow
