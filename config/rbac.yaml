apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-image-builder
  namespace: ab-eval-flow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-builder
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: ab-eval-flow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pipeline-trial-manager
  namespace: ab-eval-flow
rules:
  - apiGroups: [""]
    resources: [pods, pods/exec, pods/log]
    verbs: [create, get, list, watch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-trial-manager
  namespace: ab-eval-flow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pipeline-trial-manager
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: ab-eval-flow
