# LiteLLM proxy configuration for ABEvalFlow.
# Deployed via config/litellm/configmap.yaml (ConfigMap key: config.yaml).
#
# Placeholders:
#   <gcp-project-id>  — replace with your Vertex AI GCP project
#   OTEL_* env vars   — set on the Deployment (see deployment.yaml)

model_list:
  - model_name: claude-sonnet
    litellm_params:
      model: vertex_ai/claude-sonnet-4-20250514
      vertex_project: "<gcp-project-id>"
      vertex_location: global

litellm_settings:
  drop_params: true
  set_verbose: false
  num_retries: 2
  request_timeout: 120
  success_callback: ["otel"]
  failure_callback: ["otel"]
  service_callback: []

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  otel_exporter: otlp_http
  otel_endpoint: "http://otel-collector.monitoring.svc:4318"
  otel_headers: ""
