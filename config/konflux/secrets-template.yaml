---
apiVersion: v1
kind: Secret
metadata:
  name: workload-cluster-credentials
  namespace: ai5-marketplace-tenant
type: Opaque
stringData:
  # Token for the abevalflow-deployer ServiceAccount on the workload cluster.
  # Create the SA and token on the workload cluster:
  #   oc create sa abevalflow-deployer -n ab-eval-flow
  #   oc adm policy add-role-to-user edit -z abevalflow-deployer -n ab-eval-flow
  #   oc create token abevalflow-deployer -n ab-eval-flow --duration=8760h
  token: "<REPLACE_WITH_WORKLOAD_CLUSTER_SA_TOKEN>"
  server: "https://api.cn-ai-lab.2vn8.p1.openshiftapps.com:6443"
---
apiVersion: v1
kind: Secret
metadata:
  name: llm-credentials
  namespace: ai5-marketplace-tenant
type: Opaque
stringData:
  # LLM API key. When using LiteLLM proxy (which handles real auth to
  # Vertex AI), set this to "sk-dummy".
  api-key: "<REPLACE_WITH_LLM_API_KEY>"
---
apiVersion: v1
kind: Secret
metadata:
  name: compass-facts-api
  namespace: ai5-marketplace-tenant
type: Opaque
stringData:
  # Bearer token for the Compass Soundcheck Facts API.
  # Optional — if not configured, scorecard is computed but facts are not pushed.
  token: "<REPLACE_WITH_COMPASS_API_TOKEN>"
