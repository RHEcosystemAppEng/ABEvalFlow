apiVersion: batch/v1
kind: Job
metadata:
  name: abevalflow-migrate
  namespace: ab-eval-flow
  labels:
    app: abevalflow
    component: migration
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: abevalflow
        component: migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: registry.access.redhat.com/ubi9/python-311@sha256:8c7baa29b60b9edca185920ea6e5efcf547ef0f55e5c4e99c0491e6a5b7e3247
          command:
            - /bin/bash
            - -c
            - |
              set -e
              REPO_REF="${PIPELINE_REPO_REVISION:-main}"
              git clone --depth 1 --branch "$REPO_REF" \
                https://github.com/RHEcosystemAppEng/ABEvalFlow.git /tmp/abevalflow
              cd /tmp/abevalflow
              pip install --quiet --no-cache-dir uv
              uv sync --frozen
              alembic upgrade head
              echo "Migration complete (ref: $REPO_REF)"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ab-eval-db-credentials
                  key: database-url
            - name: PIPELINE_REPO_REVISION
              value: "main"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
