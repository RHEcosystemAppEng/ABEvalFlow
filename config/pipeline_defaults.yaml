apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeline-defaults
  namespace: ab-eval-flow
  labels:
    app.kubernetes.io/part-of: abevalflow
data:
  # Default: claude-code agent talks directly to LiteLLM proxy via Anthropic format.
  # For non-Claude models (llama, etc.), set llm-agent-wrapper to opencode or qwen-coder.
  llm-model: "claude-sonnet"
  llm-api-base: "http://litellm.ab-eval-flow.svc:4000"
  llm-api-key: "mock"
  llm-agent-wrapper: ""
