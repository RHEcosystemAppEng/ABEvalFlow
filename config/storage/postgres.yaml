apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: ab-eval-flow
  labels:
    app.kubernetes.io/part-of: abevalflow
    app.kubernetes.io/name: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: kubevirt-csi-infra-default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: ab-eval-flow
  labels:
    app.kubernetes.io/part-of: abevalflow
    app.kubernetes.io/name: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/part-of: abevalflow
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: image-registry.openshift-image-registry.svc:5000/openshift/postgresql:15-el9
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              value: abevalflow
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ab-eval-db-credentials
                  key: postgres-password
            - name: POSTGRESQL_DATABASE
              value: abevalflow
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U abevalflow -d abevalflow
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U abevalflow -d abevalflow
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ab-eval-flow
  labels:
    app.kubernetes.io/part-of: abevalflow
    app.kubernetes.io/name: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres
