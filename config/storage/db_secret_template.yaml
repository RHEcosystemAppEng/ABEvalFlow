apiVersion: v1
kind: Secret
metadata:
  name: ab-eval-db-credentials
  namespace: ab-eval-flow
  labels:
    app.kubernetes.io/part-of: abevalflow
    app.kubernetes.io/name: postgres
type: Opaque
stringData:
  postgres-password: "<replace-with-generated-password>"
  database-url: "postgresql+psycopg://abevalflow:<replace-with-generated-password>@postgres.ab-eval-flow.svc:5432/abevalflow"
