# Lightweight dedicated MLflow tracking server for ABEvalFlow AEH runs.
# Backend: sqlite on PVC. Artifacts: same PVC under /mlflow/artifacts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: abevalflow-mlflow
  namespace: guy-ziv-evalflow
  labels:
    app.kubernetes.io/part-of: abevalflow
    app.kubernetes.io/name: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow
        app.kubernetes.io/part-of: abevalflow
    spec:
      # OpenShift restricted-v2 assigns UID/fsGroup from the namespace range;
      # do not hard-code fsGroup (it is rejected outside that range).
      securityContext:
        runAsNonRoot: true
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.14.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /mlflow/artifacts
              # Single uvicorn worker: default multi-worker forks OOM under small limits.
              exec mlflow server \
                --host 0.0.0.0 \
                --port 5000 \
                --allowed-hosts '*' \
                --cors-allowed-origins '*' \
                --backend-store-uri sqlite:////mlflow/mlflow.db \
                --default-artifact-root /mlflow/artifacts \
                --serve-artifacts \
                --uvicorn-opts '--workers 1 --timeout-keep-alive 120'
          volumeMounts:
            - name: data
              mountPath: /mlflow
            - name: tmp
              mountPath: /tmp
          resources:
            # mlflow:v3.14.0 needs ~1.5–2Gi once the ASGI app is loaded
            requests:
              cpu: "200m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "3Gi"
          readinessProbe:
            httpGet:
              path: /api/2.0/mlflow/experiments/search?max_results=1
              port: 5000
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 18
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: abevalflow-mlflow-data
        - name: tmp
          emptyDir: {}
