# Optional external UI / API access for guy-ziv-evalflow MLflow.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: abevalflow-mlflow
  namespace: guy-ziv-evalflow
  labels:
    app.kubernetes.io/part-of: abevalflow
    app.kubernetes.io/name: mlflow
spec:
  to:
    kind: Service
    name: abevalflow-mlflow
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
