name: Push Tekton Bundles

on:
  push:
    branches: [main]
    paths:
      - 'pipeline/tasks/konflux/**'
      - 'pipeline/integration/Makefile'
  workflow_dispatch:
    inputs:
      version:
        description: 'Bundle version tag'
        required: false
        default: '0.1'

env:
  QUAY_REPO: quay.io/rh-ee-ikrispin/abevalflow-catalog
  VERSION: ${{ github.event.inputs.version || '0.1' }}

jobs:
  push-bundles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tkn CLI
        run: |
          TKN_VERSION="0.37.0"
          curl -sLO "https://github.com/tektoncd/cli/releases/download/v${TKN_VERSION}/tkn_${TKN_VERSION}_Linux_x86_64.tar.gz"
          tar xzf "tkn_${TKN_VERSION}_Linux_x86_64.tar.gz" tkn
          sudo mv tkn /usr/local/bin/
          tkn version

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Login to Quay.io
        run: |
          echo "${{ secrets.QUAY_TOKEN }}" | tkn bundle push --help > /dev/null 2>&1 || true
          mkdir -p ~/.docker
          echo '{"auths":{"quay.io":{"auth":"'$(echo -n "${{ secrets.QUAY_USERNAME }}:${{ secrets.QUAY_TOKEN }}" | base64 -w0)'"}}}' > ~/.docker/config.json

      - name: Push all bundles
        working-directory: pipeline/integration
        run: make bundles VERSION=${{ env.VERSION }}

      - name: Print digests
        working-directory: pipeline/integration
        run: make digests VERSION=${{ env.VERSION }}
