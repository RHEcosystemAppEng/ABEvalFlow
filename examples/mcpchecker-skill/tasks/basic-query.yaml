# Basic Query Task
#
# This task tests the agent's ability to query data from the MCP server
# and return meaningful results.

apiVersion: mcpchecker/v1
kind: Task
metadata:
  name: basic-query
  description: Test basic data query functionality
spec:
  # The prompt given to the agent
  prompt: |
    Query the MCP server for available resources or data.
    Summarize what information is available from this server.

  # LLM judge verification (semantic checking)
  verify:
    - type: llm_judge
      description: Agent should have successfully queried the server
      criteria: |
        The agent's response should:
        1. Indicate that it made a query to the MCP server
        2. List or describe available resources/data
        3. Be informative and accurate based on the server's response

  # Minimum tool calls expected
  minToolCalls: 1
