# Health Check Task
#
# This task verifies that the MCP server is responding and the agent
# can successfully call basic tools.

apiVersion: mcpchecker/v1
kind: Task
metadata:
  name: health-check
  description: Verify MCP server is healthy and responding
spec:
  # The prompt given to the agent
  prompt: |
    Check if the MCP server is healthy by calling its health or status tool.
    Report whether the server is operational.

  # Expected tool calls (optional - for tool usage verification)
  expectedTools:
    - server: example-server
      tool: health
      # or: tool: status

  # Assertions to verify the agent's response
  assertions:
    - type: contains
      expected: healthy
      description: Response should indicate the server is healthy

    - type: contains
      expected: operational
      description: Response should confirm operational status
