# MCPChecker Evaluation Configuration
#
# This file defines the evaluation settings for MCPChecker.
# It specifies which MCP servers to test, which models to use,
# and references the task definitions.

apiVersion: mcpchecker/v1
kind: Eval
metadata:
  name: example-mcp-eval
  description: Example evaluation of an MCP server
spec:
  # Agent model - the AI that will interact with the MCP server
  agent:
    model: google:gemini-2.5-flash
    temperature: 0.0

  # Judge model - the AI that will verify the agent's outputs
  judge:
    model: openai:gpt-4o

  # Timeout per task in seconds
  taskTimeout: 300

  # Tasks to run (referenced from tasks/ directory)
  tasks:
    - tasks/health-check.yaml
    - tasks/basic-query.yaml
