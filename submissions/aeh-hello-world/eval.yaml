# Agent-Eval-Harness evaluation configuration
# This is a minimal example for testing the AEH pipeline integration

skill: aeh-hello-world

# Optional: MLflow experiment name (pipeline enable-mlflow=true)
mlflow:
  experiment: aeh-hello-world-single

# Runner configuration
runner:
  type: claude-code
  effort: low
  plugin_dirs: [skills]
  settings:
    permission_mode: bypassPermissions

# Model configuration (LiteLLM in-cluster alias; override via pipeline params if needed)
models:
  skill: claude-sonnet
  judge: claude-sonnet

# Dataset location (relative to submission)
dataset:
  path: cases

# When all judges fail/null, weighted → 0.0 (AEH default average would yield 1.0)
reward:
  formula: weighted
  weights:
    correctness: 1.0
    helpfulness: 1.0

# Judges evaluate each case
judges:
  - name: correctness
    type: llm
    prompt: |
      Evaluate whether the agent's response correctly addresses the user's request.
      Score 1.0 if fully correct, 0.5 if partially correct, 0.0 if incorrect.
      
      User request: {input}
      Agent response: {output}
      
      Respond with a JSON object: {"score": <number>, "reason": "<explanation>"}
  
  - name: helpfulness
    type: llm
    prompt: |
      Evaluate how helpful and complete the agent's response is.
      Score 1.0 if very helpful, 0.5 if somewhat helpful, 0.0 if not helpful.
      
      User request: {input}
      Agent response: {output}
      
      Respond with a JSON object: {"score": <number>, "reason": "<explanation>"}

# Thresholds for pass/fail
thresholds:
  correctness:
    min_mean: 0.7
  helpfulness:
    min_mean: 0.5
