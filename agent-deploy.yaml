apiVersion: apps/v1
kind: Deployment
metadata:
  name: lightspeed-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lightspeed-agent
  template:
    metadata:
      labels:
        app: lightspeed-agent
    spec:
      containers:
      - name: agent
        image: quay.io/ecosystem-appeng/google-lightspeed-agent:on-pr-f0beb3ab82102f03effef1b105ce1ff3ee371790
        ports:
        - containerPort: 8000
        env:
        - name: LLM_PROVIDER
          value: "litellm"
        - name: LLM_MODEL
          value: "gpt-4o"
        - name: LLM_API_BASE
          value: "http://litellm.ab-eval-flow.svc:4000"
        - name: OPENAI_API_KEY
          value: "sk-dummy"
      - name: redis
        image: redis:7-alpine
---
apiVersion: v1
kind: Service
metadata:
  name: lightspeed-agent
spec:
  selector:
    app: lightspeed-agent
  ports:
  - port: 8000
