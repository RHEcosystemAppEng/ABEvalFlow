apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: abevalflow-monitoring-pipeline
  namespace: ab-eval-flow
  labels:
    app.kubernetes.io/name: abevalflow
    app.kubernetes.io/component: monitoring
spec:
  description: >-
    Scheduled monitoring pipeline for skill performance regression detection.
    Runs evaluations on canary skills, compares with historical baselines,
    and sends Slack alerts on degradation.
    
    Triggered by CronJob, not by PR events.
  params:
    # Repository params
    - name: repo-url
      type: string
      description: Git URL of the submissions repository
    - name: revision
      type: string
      description: Git commit SHA or branch to evaluate
    - name: submission-dir
      type: string
      description: Submission directory name under submissions/
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
    - name: pipeline-repo-revision
      type: string
      default: "main"
    # Evaluation engine selection
    - name: eval-engine
      type: string
      default: "harbor"
      description: Evaluation engine (harbor, ase, mcpchecker, a2a)
    # Harbor params
    - name: harbor-fork-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/skills_eval_corrections.git"
    - name: harbor-fork-revision
      type: string
      default: "main"
    - name: eval-mode
      type: string
      default: "prebuilt"
    - name: registry-url
      type: string
      default: "image-registry.openshift-image-registry.svc:5000"
    - name: registry-namespace
      type: string
      default: "ab-eval-flow"
    - name: base-image
      type: string
      default: "image-registry.openshift-image-registry.svc:5000/ab-eval-flow/eval-base:latest"
    # LLM params
    - name: llm-model
      type: string
      default: "claude-sonnet"
    - name: llm-api-base
      type: string
      default: "http://litellm.ab-eval-flow.svc:4000"
    - name: llm-api-key
      type: string
      default: "mock"
    - name: llm-base-url
      type: string
      default: "http://litellm.ab-eval-flow.svc:4000/v1"
    - name: llm-agent-wrapper
      type: string
      default: ""
    # ASE params
    - name: ase-iterations
      type: string
      default: "5"
    - name: ase-concurrency
      type: string
      default: "1"
    - name: ase-judge-model
      type: string
      default: ""
    # MCPChecker params
    - name: mcpchecker-agent-model
      type: string
      default: "google:gemini-2.5-flash"
    - name: mcpchecker-judge-model
      type: string
      default: "openai:gpt-4o"
    - name: mcpchecker-task-timeout
      type: string
      default: "10m"
    # A2A agent params
    - name: agent-endpoint
      type: string
      default: ""
      description: A2A agent endpoint URL (if empty, deploys agent from agent-image)
    - name: agent-timeout
      type: string
      default: "120"
    - name: agent-image
      type: string
      default: "quay.io/ecosystem-appeng/google-lightspeed-agent"
    - name: agent-tag
      type: string
      default: "latest"
    - name: agent-namespace
      type: string
      default: "ab-eval-flow"
    - name: agent-release-name
      type: string
      default: "eval-lightspeed-agent"
    - name: agent-chart-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/google-lightspeed-agent.git"
    # Thresholds
    - name: uplift-threshold
      type: string
      default: "0.0"
    # Monitoring params
    - name: degradation-threshold
      type: string
      default: "0.85"
      description: >-
        Degradation threshold as a ratio. Alert if current/previous < threshold.
        Default 0.85 means a 15% drop triggers an alert.

  results:
    - name: recommendation
      description: "pass or fail based on uplift threshold"
      value: $(tasks.analyze-and-check-degradation.results.recommendation)
    - name: treatment-mean-reward
      description: "Treatment variant mean reward"
      value: $(tasks.analyze-and-check-degradation.results.treatment-mean-reward)
    - name: control-mean-reward
      description: "Control variant mean reward"
      value: $(tasks.analyze-and-check-degradation.results.control-mean-reward)
    - name: degraded
      description: "true if performance degraded beyond threshold"
      value: $(tasks.analyze-and-check-degradation.results.degraded)

  workspaces:
    - name: shared-workspace
      description: Shared PVC for all pipeline artifacts

  timeouts:
    pipeline: "2h"
    tasks: "1h30m"

  tasks:
    # ======================================================================
    # PHASE 1: PREPARE (clone + validate, skip generation)
    # ======================================================================
    - name: prepare
      taskRef:
        name: prepare
      params:
        - name: repo-url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
        - name: submission-dir
          value: $(params.submission-dir)
        - name: eval-engine
          value: $(params.eval-engine)
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
        - name: pipeline-run-name
          value: $(context.pipelineRun.name)
        - name: enable-generation
          value: "false"
        - name: llm-base-url
          value: $(params.llm-base-url)
        - name: llm-model
          value: $(params.llm-model)
        - name: agent-type
          value: "api"
        - name: max-generation-retries
          value: "0"
      workspaces:
        - name: source
          workspace: shared-workspace

    # ======================================================================
    # PHASE 2: EVALUATE (dispatches to harbor/ase/mcpchecker)
    # ======================================================================
    - name: evaluate
      runAfter: ["prepare"]
      timeout: "1h30m"
      taskRef:
        name: evaluate
      params:
        - name: eval-engine
          value: $(params.eval-engine)
        - name: submission-dir
          value: $(params.submission-dir)
        - name: submission-name
          value: $(tasks.prepare.results.submission-name)
        - name: commit-sha
          value: $(params.revision)
        - name: pipeline-run-id
          value: $(context.pipelineRun.name)
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
        # Harbor params
        - name: harbor-fork-url
          value: $(params.harbor-fork-url)
        - name: harbor-fork-revision
          value: $(params.harbor-fork-revision)
        - name: eval-mode
          value: $(params.eval-mode)
        - name: registry-url
          value: $(params.registry-url)
        - name: registry-namespace
          value: $(params.registry-namespace)
        - name: base-image
          value: $(params.base-image)
        # LLM params
        - name: llm-model
          value: $(params.llm-model)
        - name: llm-api-base
          value: $(params.llm-api-base)
        - name: llm-api-key
          value: $(params.llm-api-key)
        - name: llm-agent-wrapper
          value: $(params.llm-agent-wrapper)
        # ASE params
        - name: ase-iterations
          value: $(params.ase-iterations)
        - name: ase-concurrency
          value: $(params.ase-concurrency)
        - name: ase-judge-model
          value: $(params.ase-judge-model)
        - name: uplift-threshold
          value: $(params.uplift-threshold)
        # MCPChecker params
        - name: mcp-credentials-secret
          value: $(tasks.prepare.results.mcp-credentials-secret)
        - name: mcpchecker-agent-model
          value: $(params.mcpchecker-agent-model)
        - name: mcpchecker-judge-model
          value: $(params.mcpchecker-judge-model)
        - name: mcpchecker-task-timeout
          value: $(params.mcpchecker-task-timeout)
        # A2A params
        - name: agent-endpoint
          value: $(params.agent-endpoint)
        - name: agent-timeout
          value: $(params.agent-timeout)
        - name: agent-image
          value: $(params.agent-image)
        - name: agent-tag
          value: $(params.agent-tag)
        - name: agent-namespace
          value: $(params.agent-namespace)
        - name: agent-release-name
          value: $(params.agent-release-name)
        - name: agent-chart-url
          value: $(params.agent-chart-url)
      workspaces:
        - name: source
          workspace: shared-workspace

    # ======================================================================
    # PHASE 3: ANALYZE + DEGRADATION CHECK
    # ======================================================================
    - name: analyze-and-check-degradation
      when:
        - input: $(params.eval-engine)
          operator: notin
          values: ["mcpchecker"]
      runAfter: ["evaluate"]
      taskRef:
        name: analyze-and-check-degradation
      params:
        - name: submission-name
          value: $(tasks.prepare.results.submission-name)
        - name: eval-engine
          value: $(params.eval-engine)
        - name: commit-sha
          value: $(params.revision)
        - name: pipeline-run-id
          value: $(context.pipelineRun.name)
        - name: harbor-fork-revision
          value: $(params.harbor-fork-revision)
        - name: uplift-threshold
          value: $(params.uplift-threshold)
        - name: security-scan-mode
          value: "disabled"
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
        - name: llm-model
          value: $(params.llm-model)
        - name: repo-name
          value: ""
        - name: pr-number
          value: ""
        - name: enable-degradation-check
          value: "true"
        - name: degradation-threshold
          value: $(params.degradation-threshold)
      workspaces:
        - name: source
          workspace: shared-workspace

    # ======================================================================
    # PHASE 4: STORE (PostgreSQL persistence + MinIO artifact upload)
    # Runs after analyze (harbor/ase) or after evaluate (mcpchecker/a2a)
    # ======================================================================
    - name: store
      runAfter: ["analyze-and-check-degradation", "evaluate"]
      taskRef:
        name: store
      params:
        - name: submission-name
          value: $(tasks.prepare.results.submission-name)
        - name: pipeline-run-id
          value: $(context.pipelineRun.name)
        - name: report-prefix
          value: $(tasks.prepare.results.report-prefix)
        - name: recommendation
          value: $(tasks.evaluate.results.recommendation)
        - name: results-dir
          value: $(tasks.evaluate.results.results-dir)
        - name: eval-engine
          value: $(params.eval-engine)
        - name: commit-sha
          value: $(params.revision)
        - name: uplift-threshold
          value: "-1.0"
        - name: quay-repo
          value: ""
        - name: quay-ttl-days
          value: "7"
        - name: repo-name
          value: ""
        - name: pr-number
          value: ""
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
      workspaces:
        - name: source
          workspace: shared-workspace

  # ========================================================================
  # CLEANUP (finally - always runs)
  # ========================================================================
  finally:
    - name: cleanup
      taskRef:
        name: cleanup-pvc
      params:
        - name: pipelinerun-name
          value: $(context.pipelineRun.name)
