apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: abevalflow-pipeline-dev
  namespace: ab-eval-flow
  labels:
    app.kubernetes.io/name: abevalflow
    app.kubernetes.io/version: "2.0"
spec:
  description: >-
    End-to-end A/B evaluation pipeline for AI skill submissions.
    Restructured into clean phases: prepare → test → evaluate → analyze → store.
    Supports Harbor (containerized A/B), ASE (LLM-as-judge), and MCPChecker (MCP server testing).
  params:
    # Repository params
    - name: repo-url
      type: string
      description: Git URL of the submissions repository
    - name: revision
      type: string
      description: Git commit SHA or branch to evaluate
    - name: submission-dir
      type: string
      description: Submission directory name under submissions/
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
    - name: pipeline-repo-revision
      type: string
      default: "main"
    # Evaluation engine selection
    - name: eval-engine
      type: string
      default: "harbor"
      description: Evaluation engine (harbor, ase, mcpchecker, both)
    # Harbor params
    - name: harbor-fork-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/skills_eval_corrections.git"
    - name: harbor-fork-revision
      type: string
      default: "feature/local-environment"
    - name: eval-mode
      type: string
      default: "prebuilt"
    - name: registry-url
      type: string
      default: "image-registry.openshift-image-registry.svc:5000"
    - name: registry-namespace
      type: string
      default: "ab-eval-flow"
    - name: base-image
      type: string
      default: "image-registry.openshift-image-registry.svc:5000/ab-eval-flow/eval-base:local-env"
    # LLM params
    - name: llm-model
      type: string
      default: "claude-sonnet"
    - name: llm-api-base
      type: string
      default: "http://litellm.ab-eval-flow.svc:4000"
    - name: llm-api-key
      type: string
      default: "mock"
    - name: llm-base-url
      type: string
      default: "http://litellm.ab-eval-flow.svc:4000/v1"
    - name: llm-generation-model
      type: string
      default: "claude-sonnet"
    - name: llm-agent-wrapper
      type: string
      default: ""
    # Feature flags
    - name: enable-ai-generation
      type: string
      default: "true"
    - name: enable-test-quality-review
      type: string
      default: "true"
    - name: enable-scorecard
      type: string
      default: "true"
      description: Enable unified scorecard aggregation in analyze phase
    - name: agent-type
      type: string
      default: "api"
    - name: max-generation-retries
      type: string
      default: "3"
    # Thresholds
    - name: uplift-threshold
      type: string
      default: "0.0"
    - name: quay-uplift-threshold
      type: string
      default: "-1.0"
    # ASE params
    - name: ase-iterations
      type: string
      default: "5"
    - name: ase-concurrency
      type: string
      default: "1"
    - name: ase-judge-model
      type: string
      default: ""
    # MCPChecker params
    - name: mcpchecker-agent-model
      type: string
      default: "google:gemini-2.5-flash"
    - name: mcpchecker-judge-model
      type: string
      default: "openai:gpt-4o"
    - name: mcpchecker-task-timeout
      type: string
      default: "10m"
    # A2A agent params
    - name: agent-endpoint
      type: string
      default: ""
      description: A2A agent endpoint URL
    - name: agent-timeout
      type: string
      default: "120"
    - name: agent-image
      type: string
      default: "quay.io/ecosystem-appeng/google-lightspeed-agent"
    - name: agent-tag
      type: string
      default: "latest"
    - name: agent-namespace
      type: string
      default: "ab-eval-flow"
    - name: agent-release-name
      type: string
      default: "eval-lightspeed-agent"
    - name: agent-chart-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/google-lightspeed-agent.git"
    # Security scanning
    - name: security-scan
      type: string
      default: ""
    # Publishing
    - name: quay-repo
      type: string
      default: ""
    - name: quay-ttl-days
      type: string
      default: "7"
    - name: repo-name
      type: string
      default: ""
    - name: pr-number
      type: string
      default: ""

  results:
    - name: recommendation
      description: "pass or fail based on uplift threshold"
      value: $(tasks.analyze.results.recommendation)
    - name: treatment-mean-reward
      description: "Treatment variant mean reward (e.g. 0.8500)"
      value: $(tasks.analyze.results.treatment-mean-reward)
    - name: control-mean-reward
      description: "Control variant mean reward (e.g. 0.6000)"
      value: $(tasks.analyze.results.control-mean-reward)
    - name: mean-reward-gap
      description: "Mean reward gap, treatment - control (e.g. +0.1500)"
      value: $(tasks.analyze.results.mean-reward-gap)
    - name: ttest-p-value
      description: "Welch's t-test p-value (e.g. 0.0342)"
      value: $(tasks.analyze.results.ttest-p-value)
    - name: fisher-p-value
      description: "Fisher's exact test p-value (e.g. 0.0271)"
      value: $(tasks.analyze.results.fisher-p-value)
    - name: scorecard-recommendation
      description: "Unified scorecard recommendation (pass/warn/fail)"
      value: $(tasks.analyze.results.scorecard-recommendation)

  workspaces:
    - name: shared-workspace
      description: Shared PVC for all pipeline artifacts

  timeouts:
    pipeline: "4h"
    tasks: "3h"

  tasks:
    # ======================================================================
    # PHASE 1: PREPARE (clone + generate + validate)
    # ======================================================================
    - name: prepare
      taskRef:
        name: prepare
      params:
        - name: repo-url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
        - name: submission-dir
          value: $(params.submission-dir)
        - name: eval-engine
          value: $(params.eval-engine)
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
        - name: pipeline-run-name
          value: $(context.pipelineRun.name)
        - name: enable-generation
          value: $(params.enable-ai-generation)
        - name: llm-base-url
          value: $(params.llm-base-url)
        - name: llm-model
          value: $(params.llm-generation-model)
        - name: agent-type
          value: $(params.agent-type)
        - name: max-generation-retries
          value: $(params.max-generation-retries)
      workspaces:
        - name: source
          workspace: shared-workspace

    # ======================================================================
    # PHASE 2: TEST (security scan + quality review, with immediate persistence)
    # ======================================================================
    - name: test
      runAfter: ["prepare"]
      taskRef:
        name: test
      params:
        - name: submission-dir
          value: $(params.submission-dir)
        - name: submission-name
          value: $(tasks.prepare.results.submission-name)
        - name: eval-engine
          value: $(params.eval-engine)
        - name: report-prefix
          value: $(tasks.prepare.results.report-prefix)
        - name: pipeline-run-name
          value: $(context.pipelineRun.name)
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
        - name: security-scan-mode
          value: $(params.security-scan)
        - name: submission-security-scan
          value: $(tasks.prepare.results.security-scan)
        - name: submission-skip-quality-review
          value: $(tasks.prepare.results.skip-quality-review)
        - name: security-scan-use-llm
          value: $(tasks.prepare.results.security-scan-use-llm)
        - name: enable-quality-review
          value: $(params.enable-test-quality-review)
        - name: llm-base-url
          value: $(params.llm-base-url)
        - name: llm-model
          value: $(params.llm-generation-model)
        - name: llm-api-key
          value: $(params.llm-api-key)
      workspaces:
        - name: source
          workspace: shared-workspace

    # ======================================================================
    # PHASE 3: EVALUATE (dispatches to harbor/ase/mcpchecker)
    # ======================================================================
    - name: evaluate
      runAfter: ["test"]
      timeout: "3h"
      taskRef:
        name: evaluate
      params:
        - name: eval-engine
          value: $(params.eval-engine)
        - name: submission-dir
          value: $(params.submission-dir)
        - name: submission-name
          value: $(tasks.prepare.results.submission-name)
        - name: commit-sha
          value: $(params.revision)
        - name: pipeline-run-id
          value: $(context.pipelineRun.name)
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
        # Harbor params
        - name: harbor-fork-url
          value: $(params.harbor-fork-url)
        - name: harbor-fork-revision
          value: $(params.harbor-fork-revision)
        - name: eval-mode
          value: $(params.eval-mode)
        - name: registry-url
          value: $(params.registry-url)
        - name: registry-namespace
          value: $(params.registry-namespace)
        - name: base-image
          value: $(params.base-image)
        # LLM params
        - name: llm-model
          value: $(params.llm-model)
        - name: llm-api-base
          value: $(params.llm-api-base)
        - name: llm-api-key
          value: $(params.llm-api-key)
        - name: llm-agent-wrapper
          value: $(params.llm-agent-wrapper)
        # ASE params
        - name: ase-iterations
          value: $(params.ase-iterations)
        - name: ase-concurrency
          value: $(params.ase-concurrency)
        - name: ase-judge-model
          value: $(params.ase-judge-model)
        - name: uplift-threshold
          value: $(params.uplift-threshold)
        # MCPChecker params
        - name: mcp-credentials-secret
          value: $(tasks.prepare.results.mcp-credentials-secret)
        - name: mcpchecker-agent-model
          value: $(params.mcpchecker-agent-model)
        - name: mcpchecker-judge-model
          value: $(params.mcpchecker-judge-model)
        - name: mcpchecker-task-timeout
          value: $(params.mcpchecker-task-timeout)
        # A2A params
        - name: agent-endpoint
          value: $(params.agent-endpoint)
        - name: agent-timeout
          value: $(params.agent-timeout)
        - name: agent-image
          value: $(params.agent-image)
        - name: agent-tag
          value: $(params.agent-tag)
        - name: agent-namespace
          value: $(params.agent-namespace)
        - name: agent-release-name
          value: $(params.agent-release-name)
        - name: agent-chart-url
          value: $(params.agent-chart-url)
      workspaces:
        - name: source
          workspace: shared-workspace

    # ======================================================================
    # PHASE 4: ANALYZE (statistical analysis and report generation)
    # Note: For MCPChecker, evaluate phase produces the final report directly
    # ======================================================================
    - name: analyze
      when:
        - input: $(params.eval-engine)
          operator: notin
          values: ["mcpchecker"]
      runAfter: ["evaluate"]
      taskRef:
        name: analyze-and-check-degradation
      params:
        - name: submission-name
          value: $(tasks.prepare.results.submission-name)
        - name: eval-engine
          value: $(params.eval-engine)
        - name: commit-sha
          value: $(params.revision)
        - name: pipeline-run-id
          value: $(context.pipelineRun.name)
        - name: harbor-fork-revision
          value: $(params.harbor-fork-revision)
        - name: uplift-threshold
          value: $(params.uplift-threshold)
        - name: security-scan-mode
          value: $(tasks.test.results.security-mode)
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
        - name: llm-model
          value: $(params.llm-model)
        - name: repo-name
          value: $(params.repo-name)
        - name: pr-number
          value: $(params.pr-number)
        - name: enable-degradation-check
          value: "false"
        - name: enable-scorecard
          value: $(params.enable-scorecard)
      workspaces:
        - name: source
          workspace: shared-workspace

    # ======================================================================
    # PHASE 5: STORE (PostgreSQL persistence + MinIO/Quay/PR publish)
    # ======================================================================
    - name: store
      runAfter: ["analyze", "evaluate"]
      taskRef:
        name: store
      params:
        - name: submission-name
          value: $(tasks.prepare.results.submission-name)
        - name: pipeline-run-id
          value: $(context.pipelineRun.name)
        - name: report-prefix
          value: $(tasks.prepare.results.report-prefix)
        - name: recommendation
          value: $(tasks.evaluate.results.recommendation)
        - name: results-dir
          value: $(tasks.evaluate.results.results-dir)
        - name: eval-engine
          value: $(params.eval-engine)
        - name: commit-sha
          value: $(params.revision)
        - name: uplift-threshold
          value: $(params.quay-uplift-threshold)
        - name: quay-repo
          value: $(params.quay-repo)
        - name: quay-ttl-days
          value: $(params.quay-ttl-days)
        - name: repo-name
          value: $(params.repo-name)
        - name: pr-number
          value: $(params.pr-number)
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
      workspaces:
        - name: source
          workspace: shared-workspace

  # ========================================================================
  # CLEANUP (finally - always runs)
  # ========================================================================
  finally:
    - name: cleanup
      taskRef:
        name: cleanup-pvc
      params:
        - name: pipelinerun-name
          value: $(context.pipelineRun.name)
