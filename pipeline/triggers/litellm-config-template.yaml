apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: litellm-config-template
  namespace: ab-eval-flow
spec:
  params: []
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: monitoring-litellm-config-
        labels:
          abevalflow.trigger: litellm-config-change
      spec:
        pipelineRef:
          name: abevalflow-monitoring-pipeline
        params:
          - name: repo-url
            value: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
          - name: revision
            value: "main"
          - name: submission-dir
            value: "a2a-agent-eval"
          - name: pipeline-repo-revision
            value: "main"
          - name: eval-engine
            value: "a2a"
          - name: agent-endpoint
            value: "http://lightspeed-agent.ab-eval-flow.svc:8000"
          - name: degradation-threshold
            value: "0.70"
        timeouts:
          pipeline: "2h"
          tasks: "1h30m"
        taskRunTemplate:
          serviceAccountName: pipeline
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 1Gi
