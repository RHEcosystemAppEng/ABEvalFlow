apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: quay-push-template
  namespace: ab-eval-flow
spec:
  params:
    - name: agent-image
      description: Full Quay image URL (without tag)
    - name: agent-tag
      description: Image tag that was just pushed
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: monitoring-quay-push-
        labels:
          abevalflow.trigger: quay-push
      spec:
        pipelineRef:
          name: abevalflow-monitoring-pipeline
        params:
          - name: repo-url
            value: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
          - name: revision
            value: "main"
          - name: submission-dir
            value: "a2a-agent-eval"
          - name: pipeline-repo-revision
            value: "main"
          - name: eval-engine
            value: "a2a"
          - name: agent-image
            value: $(tt.params.agent-image)
          - name: agent-tag
            value: $(tt.params.agent-tag)
          - name: agent-endpoint
            value: ""
          - name: degradation-threshold
            value: "0.70"
        timeouts:
          pipeline: "2h"
          tasks: "1h30m"
        taskRunTemplate:
          serviceAccountName: pipeline
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 1Gi
