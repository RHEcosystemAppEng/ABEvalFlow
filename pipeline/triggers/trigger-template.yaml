apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: submission-template
  namespace: ab-eval-flow
spec:
  params:
    - name: repo-url
      description: The git repository URL
    - name: revision
      description: The git commit SHA
    - name: repo-name
      description: The full repository name (org/repo)
    - name: submission-dir
      description: The submission directory path under submissions/
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: abevalflow-
      spec:
        pipelineRef:
          name: abevalflow-pipeline
        params:
          - name: repo-url
            value: $(tt.params.repo-url)
          - name: revision
            value: $(tt.params.revision)
          - name: submission-dir
            value: $(tt.params.submission-dir)
          - name: pipeline-repo-revision
            value: "main"
        taskRunTemplate:
          serviceAccountName: pipeline
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 1Gi
