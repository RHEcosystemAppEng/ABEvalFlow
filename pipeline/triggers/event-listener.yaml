apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: submission-listener
  namespace: ab-eval-flow
spec:
  serviceAccountName: pipeline
  triggers:
    - name: submission-pr-trigger
      interceptors:
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: >-
                header.match('X-GitHub-Event', 'pull_request') &&
                body.action in ['opened', 'synchronize', 'reopened'] &&
                body.pull_request.base.ref == 'main' &&
                body.pull_request.head.ref.startsWith('eval/')
            - name: "overlays"
              value:
                - key: submission_directory
                  expression: >-
                    body.pull_request.head.ref.split('/')[1]
      bindings:
        - ref: submission-binding
      template:
        ref: submission-template
    - name: quay-push-trigger
      interceptors:
        - ref:
            name: "cel"
          params:
            - name: "filter"
              # Whitelist only production tags to avoid spurious triggers from
              # digest tags, PR builds, and commit SHA tags
              value: >-
                body.docker_url == "quay.io/ecosystem-appeng/google-lightspeed-agent" &&
                body.updated_tags.exists(t, t == 'latest' || t == 'stable' || t.startsWith('v') || t.startsWith('release-'))
            - name: "overlays"
              value:
                - key: agent_tag
                  expression: >-
                    body.updated_tags.filter(t, t == 'latest' || t == 'stable' || t.startsWith('v') || t.startsWith('release-'))[0]
      bindings:
        - ref: quay-push-binding
      template:
        ref: quay-push-template
    # NOTE: A GitHub webhook must be configured on RHEcosystemAppEng/ABEvalFlow
    # pointing to this EventListener URL for litellm-config-push-trigger to fire.
    - name: litellm-config-push-trigger
      interceptors:
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: >-
                header.match('X-GitHub-Event', 'push') &&
                body.ref == 'refs/heads/main' &&
                body.repository.full_name == 'RHEcosystemAppEng/ABEvalFlow' &&
                body.commits.exists(c, c.modified.exists(f, f.startsWith('config/litellm/')) || c.added.exists(f, f.startsWith('config/litellm/')))
      bindings:
        - ref: litellm-config-binding
      template:
        ref: litellm-config-template
