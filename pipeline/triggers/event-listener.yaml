apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: submission-listener
  namespace: ab-eval-flow
spec:
  serviceAccountName: pipeline
  triggers:
    - name: submission-push-trigger
      interceptors:
        - ref:
            name: "cel"
          params:
            - name: "filter"
              # Only fire when at least one commit touches submissions/
              value: >-
                body.commits.exists(c,
                  c.added.exists(f, f.startsWith('submissions/')) ||
                  c.modified.exists(f, f.startsWith('submissions/'))
                )
            - name: "overlays"
              value:
                - key: submission_directory
                  # Extract the first subdirectory under submissions/
                  # e.g. submissions/my-submission/SKILL.md -> my-submission
                  # NOTE: single-submission-per-push assumed; multi-submission
                  # pushes only evaluate the first submission found.
                  expression: >-
                    body.commits.map(c,
                      c.added + c.modified
                    ).flatten().filter(f,
                      f.startsWith('submissions/')
                    )[0].split('/')[1]
      bindings:
        - ref: submission-binding
      template:
        ref: submission-template
