apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: abevalflow-pipeline
  namespace: ab-eval-flow
spec:
  description: >-
    End-to-end A/B evaluation pipeline for AI skill submissions.
    Validates the submission, scaffolds treatment/control variants,
    builds container images, runs Harbor evaluations, analyzes
    results, and persists them to PostgreSQL.
  params:
    - name: repo-url
      type: string
      description: Git URL of the submissions repository
    - name: revision
      type: string
      description: Git commit SHA or branch to evaluate
    - name: submission-dir
      type: string
      description: >-
        Submission directory name under submissions/ (e.g. my-skill)
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
      description: URL of the ABEvalFlow pipeline repository (scripts and templates)
    - name: pipeline-repo-revision
      type: string
      default: "main"
      description: Branch or SHA of the pipeline repo to use for scripts
    - name: registry-url
      type: string
      default: "image-registry.openshift-image-registry.svc:5000"
      description: Container registry URL for built images
    - name: registry-namespace
      type: string
      default: "ab-eval-flow"
      description: Registry namespace / project name
    - name: harbor-fork-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/skills_eval_corrections.git"
      description: Harbor fork repository URL
    - name: harbor-fork-revision
      type: string
      default: "main"
      description: Branch or SHA of the Harbor fork to install
    - name: eval-mode
      type: string
      default: "prebuilt"
      description: >-
        Evaluation mode: 'prebuilt' uses digest image refs from build-push;
        'local-build' lets Harbor build from each task's Dockerfile.
    - name: uplift-threshold
      type: string
      default: "0.0"
      description: >-
        Minimum mean-reward gap (treatment - control) for a 'pass'
        recommendation. Set to 0.0 to pass whenever treatment >= control.
    - name: quay-uplift-threshold
      type: string
      default: "-1.0"
      description: >-
        Minimum uplift for Quay.io image promotion. Default -1.0 disables
        promotion entirely. Set to 0.0 to promote whenever recommendation is pass.
    - name: quay-repo
      type: string
      default: ""
      description: Quay.io repository for image promotion (e.g. quay.io/myorg)
    - name: quay-ttl-days
      type: string
      default: "7"
      description: TTL in days for images promoted to Quay.io
    - name: repo-name
      type: string
      default: ""
      description: GitHub repo (org/name) for posting PR comments
    - name: pr-number
      type: string
      default: ""
      description: PR number that triggered this pipeline run
    - name: llm-model
      type: string
      default: "claude-sonnet"
      description: >-
        LLM model name (e.g. claude-sonnet, claude-haiku).
        Empty string falls back to Harbor's oracle agent.
    - name: llm-api-base
      type: string
      default: "http://litellm.ab-eval-flow.svc:4000"
      description: >-
        Base URL of the LLM API proxy.
    - name: llm-api-key
      type: string
      default: "mock"
      description: >-
        API key for the LLM provider. Use 'mock' for LiteLLM proxy,
        or a real key for direct API access.
    - name: llm-agent-wrapper
      type: string
      default: ""
      description: >-
        Agent wrapper for non-Claude models (e.g. opencode, qwen-coder).
        Empty uses claude-code agent directly.
    - name: base-image
      type: string
      default: "image-registry.openshift-image-registry.svc:5000/ab-eval-flow/eval-base:latest"
      description: >-
        Pre-built base image ref (with uv, claude-code, etc.).
        Build it with scripts/build_base_image.sh and push to the registry.
    # AI-assisted evaluation feature flags
    - name: enable-ai-generation
      type: string
      default: "true"
      description: >-
        Run the AI-assisted test generation step. The step self-skips
        for submissions with generation_mode: manual.
    - name: enable-ai-review
      type: string
      default: "true"
      description: >-
        Run independent AI quality review before scaffolding.
        Automatically disabled in oracle mode.
    - name: llm-base-url
      type: string
      default: "http://litellm.ab-eval-flow.svc:4000/v1"
      description: LLM API base URL (OpenAI-compatible endpoint)
    - name: llm-generation-model
      type: string
      default: "claude-sonnet"
      description: Model identifier for AI generation and review
    - name: agent-type
      type: string
      default: "api"
      description: >-
        How the AI generation step invokes the LLM: 'api' for direct API
        calls, or 'claude', 'cursor', 'opencode' to use a native agent CLI
        with skill loading.
    - name: max-generation-retries
      type: string
      default: "3"
      description: >-
        Maximum number of generate-validate retry attempts per generation
        step. Each failed attempt feeds validation errors back into the
        generation prompt.
    # Evaluation engine selection
    - name: eval-engine
      type: string
      default: "harbor"
      description: >-
        Evaluation engine: 'harbor' for full containerized A/B evaluation,
        'ase' for lightweight agent-skills-eval LLM-as-a-judge,
        'both' to run both engines.
    - name: ase-iterations
      type: string
      default: "5"
      description: Number of evaluation iterations for agent-skills-eval
    - name: ase-concurrency
      type: string
      default: "1"
      description: Parallel eval cases within a single agent-skills-eval run
    - name: ase-judge-model
      type: string
      default: ""
      description: >-
        Judge model for agent-skills-eval (defaults to llm-model if empty)
    # Security scanning
    - name: security-scan
      type: string
      default: ""
      description: >-
        Cisco skill-scanner mode override. Empty string uses submission's
        metadata.yaml preference. 'disabled' skips scan, 'warn' reports
        findings but continues, 'block' fails on HIGH/CRITICAL findings.

  results:
    - name: recommendation
      description: "pass or fail based on uplift threshold"
      value: $(tasks.analyze.results.recommendation)
    - name: treatment-mean-reward
      description: "Treatment variant mean reward (e.g. 0.8500)"
      value: $(tasks.analyze.results.treatment-mean-reward)
    - name: control-mean-reward
      description: "Control variant mean reward (e.g. 0.6000)"
      value: $(tasks.analyze.results.control-mean-reward)
    - name: mean-reward-gap
      description: "Mean reward gap, treatment - control (e.g. +0.1500)"
      value: $(tasks.analyze.results.mean-reward-gap)
    - name: ttest-p-value
      description: "Welch's t-test p-value (e.g. 0.0342)"
      value: $(tasks.analyze.results.ttest-p-value)
    - name: fisher-p-value
      description: "Fisher's exact test p-value (e.g. 0.0271)"
      value: $(tasks.analyze.results.fisher-p-value)

  workspaces:
    - name: shared-workspace
      description: >-
        Shared PVC across all tasks. Contains the cloned submissions repo,
        scaffolded task dirs, build contexts, evaluation results, and reports.

  timeouts:
    pipeline: "4h"
    tasks: "3h"

  tasks:
    # ------------------------------------------------------------------
    # Step 1a: Clone submissions repo
    # ------------------------------------------------------------------
    - name: clone-repo
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
      workspaces:
        - name: output
          workspace: shared-workspace

    # ------------------------------------------------------------------
    # Step 1b: AI-assisted test generation (optional, before validation)
    # ------------------------------------------------------------------
    - name: generate-tests
      when:
        - input: $(params.enable-ai-generation)
          operator: in
          values: ["true"]
      runAfter: ["clone-repo"]
      taskRef:
        name: generate-tests
      params:
        - name: submission-dir
          value: $(params.submission-dir)
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
        - name: llm-base-url
          value: $(params.llm-base-url)
        - name: llm-model
          value: $(params.llm-generation-model)
        - name: agent-type
          value: $(params.agent-type)
        - name: max-retries
          value: $(params.max-generation-retries)
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: validate
      runAfter: ["clone-repo", "generate-tests"]
      taskRef:
        name: validate-submission
      params:
        - name: submission-dir
          value: $(params.submission-dir)
        - name: eval-engine
          value: $(params.eval-engine)
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
      workspaces:
        - name: source
          workspace: shared-workspace

    # ------------------------------------------------------------------
    # Step 1c: AI quality review (optional, after validation)
    # ------------------------------------------------------------------
    - name: ai-review
      when:
        - input: $(params.agent-type)
          operator: notin
          values: ["oracle"]
        - input: $(params.enable-ai-review)
          operator: in
          values: ["true"]
      runAfter: ["validate"]
      taskRef:
        name: ai-review
      params:
        - name: submission-dir
          value: $(params.submission-dir)
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
        - name: llm-base-url
          value: $(params.llm-base-url)
        - name: llm-model
          value: $(params.llm-generation-model)
      workspaces:
        - name: source
          workspace: shared-workspace

    # ------------------------------------------------------------------
    # Step 1d: Security scan (optional, after validation)
    # Runs Cisco skill-scanner to detect prompt injection, data
    # exfiltration, and malicious code patterns. Skipped when disabled.
    # ------------------------------------------------------------------
    - name: security-scan
      runAfter: ["validate"]
      taskRef:
        name: security-scan
      params:
        - name: submission-dir
          value: $(params.submission-dir)
        - name: submission-name
          value: $(tasks.validate.results.submission-name)
        - name: pipeline-scan-mode
          value: $(params.security-scan)
        - name: submission-scan-mode
          value: $(tasks.validate.results.security-scan)
        - name: use-llm
          value: $(tasks.validate.results.security-scan-use-llm)
        - name: llm-api-base
          value: $(params.llm-base-url)
        - name: llm-api-key
          value: $(params.llm-api-key)
      workspaces:
        - name: source
          workspace: shared-workspace

    # ------------------------------------------------------------------
    # Step 2: Scaffold treatment and control task directories
    #         (Harbor path only — skipped for ASE-only evaluation)
    # ------------------------------------------------------------------
    - name: scaffold
      when:
        - input: $(params.eval-engine)
          operator: in
          values: ["harbor", "both"]
      runAfter: ["validate", "ai-review", "security-scan"]
      taskRef:
        name: scaffold-submission
      params:
        - name: submission-dir
          value: $(params.submission-dir)
        - name: submission-name
          value: $(tasks.validate.results.submission-name)
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
      workspaces:
        - name: source
          workspace: shared-workspace

    # ------------------------------------------------------------------
    # Step 3: Build and push treatment/control container images
    #         (Harbor path only — skipped for ASE-only evaluation)
    # ------------------------------------------------------------------
    - name: build-push
      when:
        - input: $(params.eval-engine)
          operator: in
          values: ["harbor", "both"]
      runAfter: ["scaffold"]
      taskRef:
        name: build-push-images
      params:
        - name: submission-name
          value: $(tasks.validate.results.submission-name)
        - name: treatment-task-dir
          value: $(tasks.scaffold.results.treatment-task-dir)
        - name: control-task-dir
          value: $(tasks.scaffold.results.control-task-dir)
        - name: commit-sha
          value: $(params.revision)
        - name: registry-url
          value: $(params.registry-url)
        - name: registry-namespace
          value: $(params.registry-namespace)
        - name: base-image
          value: $(params.base-image)
      workspaces:
        - name: source
          workspace: shared-workspace

    # ------------------------------------------------------------------
    # Step 4a: Run Harbor A/B evaluation (N trials per variant)
    #          (Harbor path only — skipped for ASE-only evaluation)
    # ------------------------------------------------------------------
    - name: harbor-eval
      when:
        - input: $(params.eval-engine)
          operator: in
          values: ["harbor", "both"]
      runAfter: ["build-push"]
      timeout: "3h"
      taskRef:
        name: harbor-eval
      params:
        - name: submission-dir
          value: $(params.submission-dir)
        - name: submission-name
          value: $(tasks.validate.results.submission-name)
        - name: treatment-task-dir
          value: $(tasks.scaffold.results.treatment-task-dir)
        - name: control-task-dir
          value: $(tasks.scaffold.results.control-task-dir)
        - name: treatment-image-ref
          value: $(tasks.build-push.results.treatment-image-ref)
        - name: control-image-ref
          value: $(tasks.build-push.results.control-image-ref)
        - name: eval-mode
          value: $(params.eval-mode)
        - name: harbor-fork-url
          value: $(params.harbor-fork-url)
        - name: harbor-fork-revision
          value: $(params.harbor-fork-revision)
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
        - name: llm-model
          value: $(params.llm-model)
        - name: llm-api-base
          value: $(params.llm-api-base)
        - name: llm-api-key
          value: $(params.llm-api-key)
        - name: llm-agent-wrapper
          value: $(params.llm-agent-wrapper)
      workspaces:
        - name: source
          workspace: shared-workspace

    # ------------------------------------------------------------------
    # Step 4b: Run agent-skills-eval lightweight evaluation
    #          (ASE path only — skipped for Harbor-only evaluation)
    # ------------------------------------------------------------------
    - name: ase-eval
      when:
        - input: $(params.eval-engine)
          operator: in
          values: ["ase", "both"]
      runAfter: ["validate", "security-scan"]
      timeout: "2h"
      taskRef:
        name: ase-eval
      params:
        - name: submission-dir
          value: $(params.submission-dir)
        - name: submission-name
          value: $(tasks.validate.results.submission-name)
        - name: llm-model
          value: $(params.llm-model)
        - name: judge-model
          value: $(params.ase-judge-model)
        - name: llm-api-base
          value: $(params.llm-api-base)
        - name: llm-api-key
          value: $(params.llm-api-key)
        - name: iterations
          value: $(params.ase-iterations)
        - name: concurrency
          value: $(params.ase-concurrency)
        - name: uplift-threshold
          value: $(params.uplift-threshold)
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
      workspaces:
        - name: source
          workspace: shared-workspace

    # ------------------------------------------------------------------
    # Step 5: Analyze results and produce statistical report
    # NOTE: analyze-report Task defined in APPENG-4985 — must be deployed
    #       to the cluster before this pipeline runs end-to-end.
    # Runs after both harbor-eval and ase-eval (Tekton proceeds when
    # skipped tasks are in runAfter). Uses filesystem conventions for
    # results-dir instead of task result references to avoid skip
    # propagation issues.
    # ------------------------------------------------------------------
    - name: analyze
      runAfter: ["harbor-eval", "ase-eval"]
      taskRef:
        name: analyze-report
      params:
        - name: submission-name
          value: $(tasks.validate.results.submission-name)
        - name: eval-engine
          value: $(params.eval-engine)
        - name: commit-sha
          value: $(params.revision)
        - name: pipeline-run-id
          value: $(context.pipelineRun.name)
        - name: harbor-fork-revision
          value: $(params.harbor-fork-revision)
        - name: uplift-threshold
          value: $(params.uplift-threshold)
        - name: security-scan-mode
          value: $(tasks.security-scan.results.effective-mode)
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
        - name: llm-model
          value: $(params.llm-model)
        - name: repo-name
          value: $(params.repo-name)
        - name: pr-number
          value: $(params.pr-number)
      workspaces:
        - name: source
          workspace: shared-workspace

    # ------------------------------------------------------------------
    # Step 6: Persist results to PostgreSQL
    # NOTE: store-results Task defined in APPENG-4985 — must be deployed
    #       to the cluster before this pipeline runs end-to-end.
    # ------------------------------------------------------------------
    - name: store-results
      runAfter: ["analyze"]
      taskRef:
        name: store-results
      params:
        - name: report-dir
          value: $(tasks.analyze.results.report-path)
        - name: submission-name
          value: $(tasks.validate.results.submission-name)
        - name: pipeline-run-id
          value: $(context.pipelineRun.name)
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
      workspaces:
        - name: source
          workspace: shared-workspace

    # ------------------------------------------------------------------
    # Step 7: Publish artifacts, PR comment, optional Quay promotion
    # Uses analyze results and pipeline params (not skippable task results)
    # to avoid Tekton skip propagation issues with conditional paths.
    # ------------------------------------------------------------------
    - name: publish
      runAfter: ["store-results"]
      taskRef:
        name: publish-store
      params:
        - name: report-dir
          value: $(tasks.analyze.results.report-path)
        - name: submission-name
          value: $(tasks.validate.results.submission-name)
        - name: pipeline-run-id
          value: $(context.pipelineRun.name)
        - name: recommendation
          value: $(tasks.analyze.results.recommendation)
        - name: eval-engine
          value: $(params.eval-engine)
        - name: commit-sha
          value: $(params.revision)
        - name: uplift-threshold
          value: $(params.quay-uplift-threshold)
        - name: quay-repo
          value: $(params.quay-repo)
        - name: quay-ttl-days
          value: $(params.quay-ttl-days)
        - name: repo-name
          value: $(params.repo-name)
        - name: pr-number
          value: $(params.pr-number)
        - name: pipeline-repo-url
          value: $(params.pipeline-repo-url)
        - name: pipeline-repo-revision
          value: $(params.pipeline-repo-revision)
      workspaces:
        - name: source
          workspace: shared-workspace

  # ------------------------------------------------------------------
  # Cleanup: delete workspace PVC after run completes (success or fail)
  # ------------------------------------------------------------------
  finally:
    - name: cleanup-pvc
      taskRef:
        name: cleanup-pvc
      params:
        - name: pipelinerun-name
          value: $(context.pipelineRun.name)
