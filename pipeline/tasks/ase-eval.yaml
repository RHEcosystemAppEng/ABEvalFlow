apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ase-eval
  namespace: ab-eval-flow
spec:
  description: >-
    Runs lightweight A/B evaluation using agent-skills-eval (ASE). Installs
    the agent-skills-eval npm package, locates SKILL.md + evals/evals.json
    in the submission, and runs N iterations with --baseline to compare
    with_skill vs without_skill LLM outputs via LLM-as-a-judge. Aggregates
    results into the same AnalysisResult format used by Harbor for unified
    downstream processing.
  params:
    - name: submission-dir
      type: string
      description: Path to the submission directory within the workspace (e.g. my-submission)
    - name: submission-name
      type: string
      description: Validated submission name (from validate-submission results)
    - name: llm-model
      type: string
      default: "claude-sonnet"
      description: Target LLM model name for evaluation
    - name: judge-model
      type: string
      default: ""
      description: Judge model name (defaults to llm-model if empty)
    - name: llm-api-base
      type: string
      default: "http://litellm.ab-eval-flow.svc:4000"
      description: Base URL of the LLM API proxy
    - name: llm-api-key
      type: string
      default: "mock"
      description: API key for the LLM provider (mock for LiteLLM proxy)
    - name: iterations
      type: string
      default: "5"
      description: Number of evaluation iterations per skill
    - name: concurrency
      type: string
      default: "1"
      description: Number of parallel eval cases within a single run
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
      description: URL of the ABEvalFlow pipeline repository
    - name: pipeline-repo-revision
      type: string
      default: "main"
      description: Branch or SHA of the pipeline repo to use for scripts
    - name: uplift-threshold
      type: string
      default: "0.0"
      description: Minimum uplift for a pass recommendation
  workspaces:
    - name: source
      description: Workspace containing the cloned submissions repository
  results:
    - name: treatment-mean-reward
      description: With-skill mean reward (pass rate) as a decimal string
    - name: control-mean-reward
      description: Without-skill mean reward (pass rate) as a decimal string
    - name: results-dir
      description: Path to the ASE results directory
  steps:
    - name: run-ase-evaluation
      image: registry.access.redhat.com/ubi9/nodejs-20:latest
      env:
        - name: OPENAI_API_KEY
          value: "$(params.llm-api-key)"
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # --- 1. Install agent-skills-eval ---
        echo "=== Installing agent-skills-eval ==="
        INSTALL_START=$(date +%s)
        npm install --global agent-skills-eval 2>&1 | tail -5
        INSTALL_END=$(date +%s)
        echo "agent-skills-eval installed in $((INSTALL_END - INSTALL_START))s"

        # --- 2. Locate skill directory ---
        SUBMISSION_PATH="$(workspaces.source.path)/submissions/$(params.submission-dir)"
        SKILL_DIR=""

        if [ -f "$SUBMISSION_PATH/skills/SKILL.md" ]; then
          SKILL_DIR="$SUBMISSION_PATH/skills"
        else
          for dir in "$SUBMISSION_PATH"/skills/*/; do
            if [ -f "${dir}SKILL.md" ]; then
              SKILL_DIR="$dir"
              break
            fi
          done
        fi

        if [ -z "$SKILL_DIR" ]; then
          echo "ERROR: No SKILL.md found in submission"
          exit 1
        fi

        if [ ! -f "$SKILL_DIR/evals/evals.json" ] && [ -f "$SUBMISSION_PATH/evals/evals.json" ]; then
          ln -s "$SUBMISSION_PATH/evals" "$SKILL_DIR/evals"
        fi

        echo "Using skill directory: $SKILL_DIR"

        # --- 3. Configure models ---
        TARGET_MODEL="$(params.llm-model)"
        JUDGE_MODEL="$(params.judge-model)"
        if [ -z "$JUDGE_MODEL" ]; then
          JUDGE_MODEL="$TARGET_MODEL"
        fi

        BASE_URL="$(params.llm-api-base)"
        if [[ "$BASE_URL" != */v1 ]]; then
          BASE_URL="${BASE_URL}/v1"
        fi

        RESULTS_DIR="$(workspaces.source.path)/eval-results/$(params.submission-name)"
        mkdir -p "$RESULTS_DIR"
        ITERATIONS=$(params.iterations)
        CONCURRENCY=$(params.concurrency)

        echo "=== ASE Evaluation Config ==="
        echo "  Target model:  $TARGET_MODEL"
        echo "  Judge model:   $JUDGE_MODEL"
        echo "  Base URL:      $BASE_URL"
        echo "  Iterations:    $ITERATIONS"
        echo "  Concurrency:   $CONCURRENCY"
        echo "  Results dir:   $RESULTS_DIR"

        # --- 4. Run N iterations ---
        echo "=== Running $ITERATIONS iterations ==="
        EVAL_START=$(date +%s)

        for i in $(seq 1 "$ITERATIONS"); do
          echo "--- Iteration $i of $ITERATIONS ---"
          ITER_START=$(date +%s)

          agent-skills-eval "$SKILL_DIR" \
            --baseline \
            --layout iteration \
            --report \
            --base-url "$BASE_URL" \
            --target "$TARGET_MODEL" \
            --judge "$JUDGE_MODEL" \
            --concurrency "$CONCURRENCY" \
            --workspace "$RESULTS_DIR/iteration-$i" \
            --log-format pretty \
            --api-key-env OPENAI_API_KEY \
          || echo "WARNING: Iteration $i exited non-zero (assertions may have failed)"

          ITER_END=$(date +%s)
          echo "Iteration $i completed in $((ITER_END - ITER_START))s"
        done

        EVAL_END=$(date +%s)
        echo "Total evaluation time: $((EVAL_END - EVAL_START))s"

    - name: aggregate-results
      image: registry.access.redhat.com/ubi9/python-311:9.6
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # --- 1. Clone / update pipeline repo ---
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        if [ -d "$PIPELINE_DIR/.git" ]; then
          git -C "$PIPELINE_DIR" fetch origin "$(params.pipeline-repo-revision)" --depth 1
          git -C "$PIPELINE_DIR" -c advice.detachedHead=false checkout FETCH_HEAD
        else
          git clone --depth 1 --branch "$(params.pipeline-repo-revision)" \
            "$(params.pipeline-repo-url)" "$PIPELINE_DIR"
        fi

        # --- 2. Install Python deps ---
        pip install --quiet --no-cache-dir pydantic pyyaml scipy

        cd "$PIPELINE_DIR"
        export PYTHONPATH="$PIPELINE_DIR"

        RESULTS_DIR="$(workspaces.source.path)/eval-results/$(params.submission-name)"
        REPORT_DIR="$(workspaces.source.path)/reports/$(params.submission-name)"
        ITERATIONS=$(params.iterations)

        # --- 3. Aggregate ---
        echo "=== Aggregating results ==="
        python3 scripts/aggregate_ase.py \
          --results-dir "$RESULTS_DIR" \
          --output-dir "$REPORT_DIR" \
          --submission-name "$(params.submission-name)" \
          --iterations "$ITERATIONS" \
          --threshold "$(params.uplift-threshold)" \
          --pipeline-run-id "${PIPELINE_RUN_ID:-unknown}"

        # --- 4. Emit Tekton results ---
        echo -n "$RESULTS_DIR" > "$(results.results-dir.path)"

        python3 - "$REPORT_DIR/report.json" \
          "$(results.treatment-mean-reward.path)" \
          "$(results.control-mean-reward.path)" <<'PARSE_RESULTS'
        import json, sys
        report = json.loads(open(sys.argv[1]).read())
        t_mr = report["summary"]["treatment"].get("mean_reward") or 0.0
        c_mr = report["summary"]["control"].get("mean_reward") or 0.0
        with open(sys.argv[2], "w") as f:
            f.write(f"{t_mr:.4f}")
        with open(sys.argv[3], "w") as f:
            f.write(f"{c_mr:.4f}")
        print(f"Treatment mean reward: {t_mr:.4f}")
        print(f"Control mean reward:   {c_mr:.4f}")
        PARSE_RESULTS
