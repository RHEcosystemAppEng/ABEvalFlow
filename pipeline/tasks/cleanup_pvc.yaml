apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: cleanup-pvc
  namespace: ab-eval-flow
spec:
  description: >-
    Deletes the workspace PVC after a pipeline run completes.
    Runs as a finally task to prevent PVC quota exhaustion.
  params:
    - name: pipelinerun-name
      type: string
      description: Name of the PipelineRun whose PVCs should be cleaned up
  steps:
    - name: delete-pvc
      image: registry.redhat.io/openshift4/ose-cli:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        echo "Cleaning up PVCs for PipelineRun $(params.pipelinerun-name)..."
        oc get pvc -n ab-eval-flow \
          -o jsonpath='{range .items[?(@.metadata.ownerReferences[0].name=="$(params.pipelinerun-name)")]}{.metadata.name}{"\n"}{end}' \
          | while read -r pvc; do
              if [ -n "$pvc" ]; then
                echo "Deleting PVC: $pvc"
                oc delete pvc "$pvc" -n ab-eval-flow --wait=false
              fi
            done
        echo "PVC cleanup complete"
