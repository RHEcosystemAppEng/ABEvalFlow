apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: store
  namespace: ab-eval-flow
spec:
  description: >-
    Persists A/B evaluation results and publishes artifacts. Step 1 writes
    report.json to PostgreSQL via store_results.py (skipped for engines
    without a DB report). Step 2 uploads reports to MinIO, optionally
    promotes images to Quay.io, posts GitHub PR comments, and cleans up
    ephemeral registry images via publish.py.
  params:
    - name: submission-name
      type: string
      description: Submission name
    - name: pipeline-run-id
      type: string
      description: Tekton PipelineRun name
    - name: report-prefix
      type: string
      default: ""
      description: >-
        MinIO report prefix (YYYYMMDD_HHMMSS_submissionname_runid).
        If empty, one will be generated (legacy behavior).
    - name: recommendation
      type: string
      description: "'pass' or 'fail' from the analyze step"
    - name: treatment-image-ref
      type: string
      default: ""
      description: Treatment image digest ref for Quay promotion and cleanup
    - name: control-image-ref
      type: string
      default: ""
      description: Control image digest ref for cleanup
    - name: commit-sha
      type: string
      default: ""
      description: Git commit SHA for image tagging
    - name: uplift-threshold
      type: string
      default: "-1.0"
      description: >-
        Minimum uplift for Quay promotion. Default -1.0 disables promotion.
    - name: quay-ttl-days
      type: string
      default: "7"
      description: TTL in days for promoted Quay images
    - name: quay-repo
      type: string
      default: ""
      description: Quay.io repo for image promotion (e.g. quay.io/myorg)
    - name: repo-name
      type: string
      default: ""
      description: GitHub repo (org/name) for PR comment
    - name: pr-number
      type: string
      default: ""
      description: PR number for GitHub comment
    - name: results-dir
      type: string
      default: ""
      description: Path to results dir for debug artifact upload (Harbor or ASE)
    - name: eval-engine
      type: string
      default: "harbor"
      description: >-
        Evaluation engine ('harbor', 'ase', 'both', 'mcpchecker', 'a2a').
        Controls whether DB storage runs and publish artifact layout.
    - name: minio-bucket
      type: string
      default: "ab-eval-reports"
      description: MinIO bucket for report storage
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
      description: URL of the pipeline repo containing scripts
    - name: pipeline-repo-revision
      type: string
      default: "main"
      description: Branch or SHA of the pipeline repo to use for scripts
  workspaces:
    - name: source
      description: Shared workspace containing evaluation artifacts
  steps:
    - name: store-to-db
      image: registry.access.redhat.com/ubi9/python-311:9.6
      env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ab-eval-db-credentials
              key: database-url
              optional: true
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        EVAL_ENGINE="$(params.eval-engine)"
        if [ "$EVAL_ENGINE" = "mcpchecker" ]; then
          echo "Skipping DB store for eval-engine=$EVAL_ENGINE"
          exit 0
        fi

        if [ -z "${DATABASE_URL:-}" ]; then
          echo "DATABASE_URL not configured, skipping DB store"
          exit 0
        fi

        # --- 1. Clone pipeline repo (or update to requested revision) ---
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        if [ -d "$PIPELINE_DIR" ]; then
          echo "Pipeline repo exists, updating to requested revision"
          git -C "$PIPELINE_DIR" fetch origin "$(params.pipeline-repo-revision)" --depth 1
          git -C "$PIPELINE_DIR" -c advice.detachedHead=false checkout FETCH_HEAD
        else
          git clone --depth 1 --branch "$(params.pipeline-repo-revision)" \
            "$(params.pipeline-repo-url)" "$PIPELINE_DIR"
        fi

        cd "$PIPELINE_DIR"
        export PYTHONPATH="$PIPELINE_DIR"

        # --- 2. Install dependencies ---
        pip install --quiet --no-cache-dir pydantic sqlalchemy "psycopg[binary]" "tenacity>=8.2" pyyaml

        # --- 3. Run store script ---
        REPORT_DIR="$(workspaces.source.path)/reports/$(params.submission-name)"
        echo "Storing results for submission=$(params.submission-name) run=$(params.pipeline-run-id)"
        echo "Report dir: $REPORT_DIR"
        python scripts/store_results.py \
          --report-dir "$REPORT_DIR" \
          --run-id "$(params.pipeline-run-id)"

        echo "Results stored successfully"

    - name: upload-artifacts
      image: registry.access.redhat.com/ubi9/python-311:9.6
      env:
        - name: MINIO_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: endpoint-url
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: root-user
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: root-password
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token
              key: token
              optional: true
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # --- 1. Clone pipeline repo (or update to requested revision) ---
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        if [ -d "$PIPELINE_DIR/.git" ]; then
          echo "Pipeline repo exists, updating to requested revision"
          git -C "$PIPELINE_DIR" fetch origin "$(params.pipeline-repo-revision)" --depth 1
          git -C "$PIPELINE_DIR" -c advice.detachedHead=false checkout FETCH_HEAD
        else
          git clone --depth 1 --branch "$(params.pipeline-repo-revision)" \
            "$(params.pipeline-repo-url)" "$PIPELINE_DIR"
        fi

        cd "$PIPELINE_DIR"
        export PYTHONPATH="$PIPELINE_DIR"

        # --- 2. Install dependencies ---
        pip install --quiet --no-cache-dir minio

        # --- 3. Run publish script (MinIO upload, Quay promotion, PR comment) ---
        REPORT_DIR="$(workspaces.source.path)/reports/$(params.submission-name)"
        echo "Publishing artifacts for submission=$(params.submission-name) run=$(params.pipeline-run-id)"
        echo "Report dir: $REPORT_DIR"

        ARGS=(
          --report-dir "$REPORT_DIR"
          --submission-name "$(params.submission-name)"
          --pipeline-run-id "$(params.pipeline-run-id)"
          --recommendation "$(params.recommendation)"
          --uplift-threshold "$(params.uplift-threshold)"
          --minio-bucket "$(params.minio-bucket)"
        )

        if [ -n "$(params.treatment-image-ref)" ]; then
          ARGS+=(--treatment-image-ref "$(params.treatment-image-ref)")
        fi
        if [ -n "$(params.control-image-ref)" ]; then
          ARGS+=(--control-image-ref "$(params.control-image-ref)")
        fi
        if [ -n "$(params.commit-sha)" ]; then
          ARGS+=(--commit-sha "$(params.commit-sha)")
        fi
        if [ -n "$(params.quay-repo)" ]; then
          ARGS+=(--quay-repo "$(params.quay-repo)")
        fi
        if [ -n "$(params.quay-ttl-days)" ]; then
          ARGS+=(--quay-ttl-days "$(params.quay-ttl-days)")
        fi
        if [ -n "$(params.repo-name)" ]; then
          ARGS+=(--repo-name "$(params.repo-name)")
        fi
        if [ -n "$(params.pr-number)" ]; then
          ARGS+=(--pr-number "$(params.pr-number)")
        fi
        RESULTS_DIR="$(params.results-dir)"
        if [ -z "$RESULTS_DIR" ] && [ "$(params.eval-engine)" != "harbor" ]; then
          RESULTS_DIR="$(workspaces.source.path)/eval-results/$(params.submission-name)"
        fi
        if [ -n "$RESULTS_DIR" ]; then
          ARGS+=(--results-dir "$RESULTS_DIR")
        fi

        ARGS+=(--eval-engine "$(params.eval-engine)")
        ARGS+=(--workspace-root "$(workspaces.source.path)")
        if [ -n "$(params.report-prefix)" ]; then
          ARGS+=(--report-prefix "$(params.report-prefix)")
        fi

        python scripts/publish.py "${ARGS[@]}"

        echo "Publish step completed successfully"
