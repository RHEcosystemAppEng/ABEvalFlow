apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: prepare
  namespace: ab-eval-flow
  labels:
    app.kubernetes.io/name: abevalflow
    app.kubernetes.io/component: phase
spec:
  description: >-
    Preparation phase: clones the submission repository, optionally generates
    evaluation files (instruction.md, evals.json), and validates the submission
    structure. Combines clone-repo, generate-tests, and validate into a single
    composite task for cleaner pipeline visualization.
  params:
    - name: repo-url
      type: string
      description: Git URL of the submissions repository
    - name: revision
      type: string
      description: Git revision (branch, tag, SHA) to checkout
    - name: submission-dir
      type: string
      description: Submission directory name under submissions/
    - name: eval-engine
      type: string
      default: "harbor"
      description: Evaluation engine (harbor, ase, mcpchecker, aeh, both)
    - name: aeh-mode
      type: string
      default: "single"
      description: AEH evaluation mode (single, pairwise)
    - name: aeh-control-config
      type: string
      default: "eval-control.yaml"
      description: Control variant eval.yaml filename for AEH pairwise mode
    - name: aeh-treatment-config
      type: string
      default: "eval-treatment.yaml"
      description: Treatment variant eval.yaml filename for AEH pairwise mode
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
    - name: pipeline-repo-revision
      type: string
      default: "main"
    - name: pipeline-run-name
      type: string
      description: Name of the PipelineRun
    - name: enable-generation
      type: string
      default: "true"
      description: Whether to run AI-assisted test generation
    - name: llm-base-url
      type: string
      default: "http://litellm.ab-eval-flow.svc:4000/v1"
    - name: llm-model
      type: string
      default: "claude-sonnet"
    - name: agent-type
      type: string
      default: "api"
    - name: max-generation-retries
      type: string
      default: "3"
    - name: max-workspace-mb
      type: string
      default: "500"
  workspaces:
    - name: source
      description: Workspace for the cloned repository
  results:
    - name: submission-name
      description: Validated submission name from metadata.yaml
    - name: report-prefix
      description: MinIO report prefix (timestamp_name_runid)
    - name: security-scan
      description: Security scan mode from metadata (disabled/warn/block)
    - name: security-scan-use-llm
      description: Whether to use LLM in security scanning
    - name: skip-quality-review
      description: Whether to skip quality review (from metadata)
    - name: mcp-credentials-secret
      description: Secret name for MCP credentials (MCPChecker only)
    - name: generated-files
      description: JSON array of generated file paths
    - name: validation-result
      description: JSON validation result object
  steps:
    # Step 1: Clone submission repository
    - name: clone-repo
      image: registry.access.redhat.com/ubi9/python-311:9.6
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        echo "=== PREPARE PHASE: Clone Repository ==="
        
        CHECKOUT_DIR="$(workspaces.source.path)"
        REVISION="$(params.revision)"
        
        git config --global --add safe.directory "$CHECKOUT_DIR"
        rm -rf "${CHECKOUT_DIR:?}"/{,.[!.],..?}* 2>/dev/null || true
        
        echo "Cloning $(params.repo-url) @ ${REVISION}"
        if git clone --depth 1 --branch "$REVISION" "$(params.repo-url)" "$CHECKOUT_DIR" 2>/dev/null; then
          echo "Cloned branch/tag $REVISION"
        else
          git clone "$(params.repo-url)" "$CHECKOUT_DIR"
          cd "$CHECKOUT_DIR"
          git checkout "$REVISION"
        fi
        
        cd "$CHECKOUT_DIR"
        echo "Cloned at $(git rev-parse HEAD)"

    # Step 2: Clone pipeline repo (for scripts)
    - name: clone-pipeline-repo
      image: registry.access.redhat.com/ubi9/python-311:9.6
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        echo "=== PREPARE PHASE: Clone Pipeline Repo ==="
        
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        if [ -d "$PIPELINE_DIR/.git" ]; then
          echo "Pipeline repo already cloned, updating..."
          cd "$PIPELINE_DIR"
          git fetch origin "$(params.pipeline-repo-revision)"
          git checkout "$(params.pipeline-repo-revision)" 2>/dev/null || git checkout FETCH_HEAD
        else
          git clone --depth 1 --branch "$(params.pipeline-repo-revision)" \
            "$(params.pipeline-repo-url)" "$PIPELINE_DIR"
        fi
        echo "Pipeline repo ready at $(params.pipeline-repo-revision)"

    # Step 3: Generate tests (conditional)
    - name: generate-tests
      image: registry.access.redhat.com/ubi9/python-311:9.6
      env:
        - name: LLM_BASE_URL
          value: "$(params.llm-base-url)"
        - name: LLM_MODEL
          value: "$(params.llm-model)"
        - name: AGENT_TYPE
          value: "$(params.agent-type)"
        - name: EVAL_ENGINE
          value: "$(params.eval-engine)"
        - name: ENABLE_GENERATION
          value: "$(params.enable-generation)"
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-credentials
              key: api-key
              optional: true
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        echo "=== PREPARE PHASE: Generate Tests ==="
        
        if [ "$ENABLE_GENERATION" != "true" ]; then
          echo "Generation disabled, skipping"
          echo "[]" > "$(results.generated-files.path)"
          exit 0
        fi
        
        # MCPChecker doesn't need test generation
        if [ "$EVAL_ENGINE" = "mcpchecker" ]; then
          echo "MCPChecker mode: no generation needed"
          echo "[]" > "$(results.generated-files.path)"
          exit 0
        fi
        
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        SUBMISSION_PATH="$(workspaces.source.path)/submissions/$(params.submission-dir)"
        WORKSPACE_DIR="$(workspaces.source.path)"
        
        cd "$PIPELINE_DIR"
        pip install --quiet --no-cache-dir pydantic pyyaml openai pytest
        export PYTHONPATH="$PIPELINE_DIR"
        
        GENERATED='[]'
        
        # ASE mode: generate evals.json if missing
        if [ "$EVAL_ENGINE" = "ase" ] || [ "$EVAL_ENGINE" = "both" ]; then
          if [ ! -f "$SUBMISSION_PATH/evals/evals.json" ]; then
            echo "ASE mode: generating evals.json from SKILL.md..."
            if python3 scripts/generate_ase_evals.py "$SUBMISSION_PATH" \
                > /tmp/ase-stdout.json 2>/tmp/ase-stderr.txt; then
              cat /tmp/ase-stdout.json
              GENERATED=$(python3 -c "import json; print(json.dumps(json.load(open('/tmp/ase-stdout.json')).get('generated', [])))" 2>/dev/null || echo "[]")
            else
              echo "WARNING: ASE evals.json generation failed:"
              cat /tmp/ase-stderr.txt || true
              cat /tmp/ase-stdout.json || true
            fi
          else
            echo "ASE mode: evals.json exists, skipping generation"
          fi
        fi
        
        # Harbor mode: generate instruction.md and tests
        if [ "$EVAL_ENGINE" = "harbor" ] || [ "$EVAL_ENGINE" = "both" ]; then
          if python scripts/generate_tests.py "$SUBMISSION_PATH" \
              --workspace-dir "$WORKSPACE_DIR" \
              --agent-type "$(params.agent-type)" \
              --max-retries "$(params.max-generation-retries)" \
              > /tmp/harbor-stdout.json 2>/tmp/harbor-stderr.txt; then
            cat /tmp/harbor-stdout.json
            HARBOR_GENERATED=$(python3 -c "import json; print(json.dumps(json.load(open('/tmp/harbor-stdout.json')).get('generated', [])))" 2>/dev/null || echo "[]")
            GENERATED=$(python3 -c "import json,sys; a=json.loads(sys.argv[1]); b=json.loads(sys.argv[2]); print(json.dumps(list(set(a+b))))" "$GENERATED" "$HARBOR_GENERATED")
          else
            echo "WARNING: Harbor test generation failed:"
            cat /tmp/harbor-stderr.txt || true
            cat /tmp/harbor-stdout.json || true
          fi
        fi
        
        echo "$GENERATED" > "$(results.generated-files.path)"
        echo "Generated files: $GENERATED"

    # Step 4: Validate submission
    - name: validate
      image: registry.access.redhat.com/ubi9/python-311:9.6
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        echo "=== PREPARE PHASE: Validate Submission ==="
        
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        SUBMISSION_PATH="$(workspaces.source.path)/submissions/$(params.submission-dir)"
        
        # Check workspace size
        MAX_MB=$(params.max-workspace-mb)
        SIZE_KB=$(du -sk "$(workspaces.source.path)" | cut -f1)
        SIZE_MB=$((SIZE_KB / 1024))
        if [ "$SIZE_MB" -gt "$MAX_MB" ]; then
          echo "ERROR: Workspace size ${SIZE_MB}MB exceeds limit ${MAX_MB}MB"
          exit 1
        fi
        echo "Workspace size: ${SIZE_MB}MB (limit: ${MAX_MB}MB)"
        
        cd "$PIPELINE_DIR"
        export PYTHONPATH="$PIPELINE_DIR"
        pip install --quiet --no-cache-dir pydantic pyyaml
        
        python scripts/validate.py "$SUBMISSION_PATH" \
          --eval-engine "$(params.eval-engine)" \
          --aeh-mode "$(params.aeh-mode)" \
          --aeh-control-config "$(params.aeh-control-config)" \
          --aeh-treatment-config "$(params.aeh-treatment-config)" \
          | tee /tmp/validation-output.json
        
        cat /tmp/validation-output.json | tr -d '\n' > "$(results.validation-result.path)"
        
        # Also write to workspace for downstream tasks (certification levels)
        REPORTS_DIR="$(workspaces.source.path)/reports/$(params.submission-dir)"
        mkdir -p "$REPORTS_DIR"
        cp /tmp/validation-output.json "$REPORTS_DIR/validation.json"
        echo "Wrote validation results to $REPORTS_DIR/validation.json"
        
        VALID=$(python3 -c "import json; print(json.load(open('/tmp/validation-output.json'))['valid'])")
        
        if [ "$VALID" = "True" ]; then
          # Extract submission name
          python3 -c "
        import yaml, sys
        meta = yaml.safe_load(open(sys.argv[1]))
        print(meta['name'], end='')
        " "$SUBMISSION_PATH/metadata.yaml" > "$(results.submission-name.path)"
          
          # Extract security_scan mode
          python3 -c "
        import yaml, sys
        meta = yaml.safe_load(open(sys.argv[1]))
        print(meta.get('security_scan', 'warn'), end='')
        " "$SUBMISSION_PATH/metadata.yaml" > "$(results.security-scan.path)"
          
          # Extract security_scan_use_llm
          python3 -c "
        import yaml, sys
        meta = yaml.safe_load(open(sys.argv[1]))
        print(str(meta.get('security_scan_use_llm', True)).lower(), end='')
        " "$SUBMISSION_PATH/metadata.yaml" > "$(results.security-scan-use-llm.path)"
          
          # Extract skip_quality_review
          python3 -c "
        import yaml, sys
        meta = yaml.safe_load(open(sys.argv[1]))
        print(str(meta.get('skip_quality_review', False)).lower(), end='')
        " "$SUBMISSION_PATH/metadata.yaml" > "$(results.skip-quality-review.path)"
          
          # Generate report prefix
          SUBMISSION_NAME=$(cat "$(results.submission-name.path)")
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          REPORT_PREFIX="${TIMESTAMP}_${SUBMISSION_NAME}_$(params.pipeline-run-name)"
          echo -n "$REPORT_PREFIX" > "$(results.report-prefix.path)"
          
          # Extract MCP credentials secret (use placeholder if not configured)
          python3 -c "
        import yaml, sys
        meta = yaml.safe_load(open(sys.argv[1]))
        mcp = meta.get('mcp') or {}
        secret = mcp.get('credentials_secret', '')
        # Use placeholder secret when not configured to avoid empty secretKeyRef name
        print(secret if secret else 'mcp-credentials-placeholder', end='')
        " "$SUBMISSION_PATH/metadata.yaml" > "$(results.mcp-credentials-secret.path)"
          
          echo "Validation PASSED"
          echo "Submission: $SUBMISSION_NAME"
          echo "Report prefix: $REPORT_PREFIX"
        else
          echo "INVALID" > "$(results.submission-name.path)"
          echo "warn" > "$(results.security-scan.path)"
          echo "false" > "$(results.security-scan-use-llm.path)"
          echo "false" > "$(results.skip-quality-review.path)"
          echo "INVALID" > "$(results.report-prefix.path)"
          echo "" > "$(results.mcp-credentials-secret.path)"
          echo "Validation FAILED"
          exit 1
        fi
