apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: ai-review
  namespace: ab-eval-flow
spec:
  description: >-
    Independent AI quality review of a skill submission.  Assesses coherence,
    coverage, clarity, feasibility, and robustness.  Produces a structured
    JSON assessment with pass/warn/fail recommendation.
  params:
    - name: submission-dir
      type: string
      description: Submission directory name under submissions/
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
      description: URL of the ABEvalFlow pipeline repository
    - name: pipeline-repo-revision
      type: string
      default: "main"
      description: Branch or SHA of the pipeline repo
    - name: llm-base-url
      type: string
      default: "http://litellm.ab-eval-flow.svc:4000/v1"
      description: LLM API base URL (OpenAI-compatible)
    - name: llm-model
      type: string
      default: "claude-sonnet-4-20250514"
      description: Model identifier for the LLM
  workspaces:
    - name: source
      description: Workspace containing the cloned submissions repository
  results:
    - name: review-result
      description: JSON quality assessment with scores and findings
    - name: review-passed
      description: Whether the review passed (true or false)
  steps:
    - name: clone-pipeline-repo
      image: registry.access.redhat.com/ubi9/python-311:9.6
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        if [ -d "$PIPELINE_DIR/.git" ]; then
          echo "Pipeline repo already cloned, skipping"
          exit 0
        fi
        git clone --depth 1 --branch "$(params.pipeline-repo-revision)" \
          "$(params.pipeline-repo-url)" "$PIPELINE_DIR"
        echo "Cloned pipeline repo at $(params.pipeline-repo-revision)"

    - name: review
      image: registry.access.redhat.com/ubi9/python-311:9.6
      env:
        - name: LLM_BASE_URL
          value: "$(params.llm-base-url)"
        - name: LLM_MODEL
          value: "$(params.llm-model)"
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-credentials
              key: api-key
              optional: true
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        SUBMISSION_PATH="$(workspaces.source.path)/submissions/$(params.submission-dir)"

        cd "$PIPELINE_DIR"
        pip install --quiet --no-cache-dir pydantic pyyaml openai
        export PYTHONPATH="$PIPELINE_DIR"

        REVIEW_EXIT=0
        python scripts/ai_review.py "$SUBMISSION_PATH" \
          | tee /tmp/review-output.json || REVIEW_EXIT=$?

        cat /tmp/review-output.json | tr -d '\n' \
          > "$(results.review-result.path)"

        cp /tmp/review-output.json "$(workspaces.source.path)/_ai_review.json"

        python -c "
        import json
        data = json.load(open('/tmp/review-output.json'))
        print(str(data.get('passed', False)).lower(), end='')
        " > "$(results.review-passed.path)"

        exit $REVIEW_EXIT
