apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: parse-snapshot
  labels:
    app.kubernetes.io/name: abevalflow
    app.kubernetes.io/component: konflux
spec:
  description: >-
    Parses a Konflux Snapshot JSON to extract the component container image,
    git source URL, git revision, and component name. This bridges the Konflux
    SNAPSHOT model with ABEvalFlow's parameter-based pipeline.
  params:
    - name: SNAPSHOT
      type: string
      description: Konflux Snapshot JSON containing component details
    - name: component-name
      type: string
      default: ""
      description: >-
        Specific component name to extract from the snapshot. If empty,
        the first component is used.
  results:
    - name: component-image
      description: Full container image reference (with digest) from the snapshot
    - name: git-url
      description: Git repository URL of the component source
    - name: git-revision
      description: Git commit SHA of the component source
    - name: component-name
      description: Name of the component extracted from the snapshot
  steps:
    - name: parse
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      env:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
        - name: TARGET_COMPONENT
          value: $(params.component-name)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        echo "=== PARSE SNAPSHOT ==="

        microdnf install -y jq --nodocs 2>/dev/null || true

        if [ -n "$TARGET_COMPONENT" ]; then
          JQ_FILTER=".components[] | select(.name == \"$TARGET_COMPONENT\")"
        else
          JQ_FILTER=".components[0]"
        fi

        COMPONENT_IMAGE=$(echo "${SNAPSHOT}" | jq -r "$JQ_FILTER | .containerImage")
        GIT_URL=$(echo "${SNAPSHOT}" | jq -r "$JQ_FILTER | .source.git.url // empty")
        GIT_REVISION=$(echo "${SNAPSHOT}" | jq -r "$JQ_FILTER | .source.git.revision // empty")
        COMPONENT_NAME=$(echo "${SNAPSHOT}" | jq -r "$JQ_FILTER | .name")

        if [ -z "$COMPONENT_IMAGE" ] || [ "$COMPONENT_IMAGE" = "null" ]; then
          echo "ERROR: Could not extract container image from snapshot"
          echo "Snapshot contents:"
          echo "${SNAPSHOT}" | jq . 2>/dev/null || echo "${SNAPSHOT}"
          exit 1
        fi

        echo -n "$COMPONENT_IMAGE" > "$(results.component-image.path)"
        echo -n "$GIT_URL" > "$(results.git-url.path)"
        echo -n "$GIT_REVISION" > "$(results.git-revision.path)"
        echo -n "$COMPONENT_NAME" > "$(results.component-name.path)"

        echo "Component: $COMPONENT_NAME"
        echo "Image: $COMPONENT_IMAGE"
        echo "Git URL: $GIT_URL"
        echo "Git Revision: $GIT_REVISION"
