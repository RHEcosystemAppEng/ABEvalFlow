apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-agent
  labels:
    app.kubernetes.io/name: abevalflow
    app.kubernetes.io/component: konflux
spec:
  description: >-
    Deploys an A2A agent as a Deployment + Service on a remote workload
    cluster using the container image from the Konflux snapshot. The agent
    is deployed to the ab-eval-flow namespace on the workload cluster where
    LiteLLM and other eval infrastructure already live.
  params:
    - name: agent-image
      type: string
      description: Agent image from the Konflux snapshot
    - name: agent-image-override
      type: string
      default: ""
      description: >-
        Override image (used when the snapshot image is in a private registry).
        When set, this takes precedence over agent-image.
    - name: llm-api-base
      type: string
      default: "http://litellm.ab-eval-flow.svc:4000"
      description: LiteLLM proxy base URL for the agent's LLM calls
    - name: llm-model
      type: string
      default: "gpt-4o"
      description: LLM model name for the agent
    - name: pipeline-run-id
      type: string
      default: ""
      description: PipelineRun name for generating unique resource names
    - name: readiness-timeout
      type: string
      default: "300"
      description: Seconds to wait for agent readiness
    - name: workload-cluster-url
      type: string
      default: "https://api.cn-ai-lab.2vn8.p1.openshiftapps.com:6443"
      description: API URL of the workload cluster where the agent is deployed
    - name: workload-namespace
      type: string
      default: "ab-eval-flow"
      description: Namespace on the workload cluster to deploy the agent
  results:
    - name: agent-endpoint
      description: HTTP endpoint URL of the deployed agent (cluster-internal)
    - name: agent-name
      description: Name of the Deployment/Service (for cleanup)
    - name: deployed
      description: Whether an agent was deployed (true/false)
  steps:
    - name: deploy
      image: registry.redhat.io/openshift4/ose-cli:latest
      env:
        - name: WORKLOAD_TOKEN
          valueFrom:
            secretKeyRef:
              name: workload-cluster-credentials
              key: token
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        echo "=== DEPLOY AGENT (cross-cluster) ==="

        CLUSTER_URL="$(params.workload-cluster-url)"
        NAMESPACE="$(params.workload-namespace)"
        # TODO: Replace --insecure-skip-tls-verify with --certificate-authority
        # once the workload cluster CA cert is available as a mounted Secret.
        oc login --server="$CLUSTER_URL" --token="$WORKLOAD_TOKEN" --insecure-skip-tls-verify=true 2>/dev/null

        RUN_ID=$(echo "$(params.pipeline-run-id)" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | cut -c1-20)
        AGENT_NAME="a2a-eval-${RUN_ID:-$(date +%s)}"
        OVERRIDE="$(params.agent-image-override)"
        if [ -n "$OVERRIDE" ]; then
          AGENT_IMAGE="$OVERRIDE"
          echo "Using override image (snapshot image not used)"
        else
          AGENT_IMAGE="$(params.agent-image)"
          echo "Using snapshot image"
        fi

        echo "Workload cluster: $CLUSTER_URL"
        echo "Namespace: $NAMESPACE"
        echo "Agent name: $AGENT_NAME"
        echo "Image: $AGENT_IMAGE"

        oc whoami || { echo "ERROR: Cannot authenticate to workload cluster"; exit 1; }

        cat <<YAML | oc apply -n $NAMESPACE -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: $AGENT_NAME
          labels:
            app: $AGENT_NAME
            abevalflow/temp: "true"
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: $AGENT_NAME
          template:
            metadata:
              labels:
                app: $AGENT_NAME
            spec:
              containers:
              - name: redis
                image: redis:7-alpine
                ports:
                - containerPort: 6379
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    cpu: 100m
                    memory: 128Mi
              - name: agent
                image: $AGENT_IMAGE
                ports:
                - containerPort: 8000
                env:
                - name: LLM_PROVIDER
                  value: "litellm"
                - name: LLM_MODEL
                  value: "openai/$(params.llm-model)"
                - name: LLM_API_BASE
                  value: "$(params.llm-api-base)"
                - name: OPENAI_API_KEY
                  value: "sk-dummy"
                - name: RATE_LIMIT_REDIS_URL
                  value: "redis://localhost:6379/0"
                - name: SKIP_JWT_VALIDATION
                  value: "true"
                - name: SKIP_ORDER_VALIDATION
                  value: "true"
                - name: LOG_LEVEL
                  value: "INFO"
                resources:
                  requests:
                    cpu: 200m
                    memory: 256Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: $AGENT_NAME
          labels:
            abevalflow/temp: "true"
        spec:
          selector:
            app: $AGENT_NAME
          ports:
          - port: 8000
            targetPort: 8000
        YAML

        TIMEOUT=$(params.readiness-timeout)

        ENDPOINT="http://${AGENT_NAME}.${NAMESPACE}.svc:8000"

        printf "Waiting for agent readiness"
        for i in $(seq 1 $((TIMEOUT / 5))); do
          if oc rollout status deployment/$AGENT_NAME -n $NAMESPACE --timeout=5s >/dev/null 2>&1; then
            READY=$(oc get deployment $AGENT_NAME -n $NAMESPACE -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            if [ "${READY:-0}" -ge 1 ]; then
              echo " ready!"
              echo -n "$ENDPOINT" > "$(results.agent-endpoint.path)"
              echo -n "$AGENT_NAME" > "$(results.agent-name.path)"
              echo -n "true" > "$(results.deployed.path)"
              echo "Agent endpoint: $ENDPOINT"
              exit 0
            fi
          fi
          printf "."
          sleep 5
        done

        echo " TIMED OUT"
        echo "Cleaning up failed deployment..."
        oc delete deployment/$AGENT_NAME service/$AGENT_NAME -n $NAMESPACE --ignore-not-found=true
        echo -n "" > "$(results.agent-endpoint.path)"
        echo -n "$AGENT_NAME" > "$(results.agent-name.path)"
        echo -n "false" > "$(results.deployed.path)"
        exit 1
