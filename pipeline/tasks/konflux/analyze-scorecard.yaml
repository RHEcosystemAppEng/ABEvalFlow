apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: analyze-scorecard
  labels:
    app.kubernetes.io/name: abevalflow
    app.kubernetes.io/component: konflux
spec:
  description: >-
    Analyzes A/B evaluation results and optionally checks for performance
    degradation against historical runs. Step 1 always runs analyze.py to
    produce report.json and Tekton results. Step 2 runs aggregate scorecard.
    Step 3 runs monitor.py and sends Slack alerts when degradation checking
    is enabled and the DB is configured; failures in step 3 are non-blocking.
    Adapted for Konflux — no hardcoded namespace, optional secrets, scorecard
    enabled by default.
  params:
    - name: submission-name
      type: string
      description: Validated submission name
    - name: eval-engine
      type: string
      default: "harbor"
      description: >-
        Evaluation engine used: 'harbor', 'ase', 'a2a', or 'both'. Controls
        which analysis path runs.
    - name: commit-sha
      type: string
      default: ""
      description: Git commit SHA for provenance
    - name: pipeline-run-id
      type: string
      default: ""
      description: Tekton PipelineRun name for provenance and alerts
    - name: harbor-fork-revision
      type: string
      default: ""
      description: Harbor fork revision used for provenance
    - name: uplift-threshold
      type: string
      default: "0.0"
      description: >-
        Minimum mean-reward gap (treatment - control) for a 'pass'
        recommendation. Set to 0.0 to pass whenever treatment >= control.
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/ikrispin/ABEvalFlow.git"
      description: URL of the ABEvalFlow pipeline repository
    - name: pipeline-repo-revision
      type: string
      default: "main"
      description: Branch or SHA of the pipeline repo to use for scripts
    - name: security-scan-mode
      type: string
      default: "disabled"
      description: Security scan mode (disabled/warn/block) for including scan results
    - name: llm-model
      type: string
      default: ""
      description: LLM model name for report metadata
    - name: repo-name
      type: string
      default: ""
      description: GitHub repo (org/name) for constructing PR URL
    - name: pr-number
      type: string
      default: ""
      description: PR number that triggered this pipeline run
    - name: enable-degradation-check
      type: string
      default: "false"
      description: >-
        When 'true', run historical degradation check after analysis (monitoring
        pipelines). CI pipelines leave this false.
    - name: degradation-threshold
      type: string
      default: "0.85"
      description: >-
        Degradation threshold as a ratio. Alert if current/previous < threshold.
    - name: openshift-console-url
      type: string
      default: "https://console-openshift-console.apps.cn-ai-lab.2vn8.p1.openshiftapps.com"
      description: Base URL for OpenShift console (for Slack message links)
    - name: enable-scorecard
      type: string
      default: "true"
      description: >-
        When 'true', aggregate all gates into a unified scorecard after analysis.
        Produces scorecard.json with combined engine, security, and quality gates.
    - name: certification-profile
      type: string
      default: ""
      description: >-
        Certification profile name (e.g., 'skill', 'agent', 'mcp_server', 'plugin').
        Provides artifact-type-specific check defaults. If empty, uses hardcoded defaults
        unless submission's metadata.yaml specifies certification_policy.
  workspaces:
    - name: source
      description: Workspace containing the evaluation results and report output
  results:
    - name: recommendation
      description: "'pass' or 'fail' based on uplift threshold"
    - name: treatment-mean-reward
      description: Treatment variant mean reward as a decimal string (e.g. "0.8500")
    - name: control-mean-reward
      description: Control variant mean reward as a decimal string (e.g. "0.6000")
    - name: mean-reward-gap
      description: "Mean reward gap (treatment - control) as a signed string (e.g. \"+0.1500\")"
    - name: ttest-p-value
      description: "Welch's t-test p-value (e.g. \"0.0342\"), or \"N/A\" if not computable"
    - name: fisher-p-value
      description: "Fisher's exact test p-value (e.g. \"0.0271\"), or \"N/A\" if not computable"
    - name: report-path
      description: Path to the directory containing report.json and report.md
    - name: degraded
      description: Whether degradation was detected (true or false)
    - name: message
      description: Human-readable degradation check result message
    - name: scorecard-recommendation
      description: Unified scorecard recommendation (pass/warn/fail)
    - name: scorecard-gates-passed
      description: Number of gates that passed
    - name: scorecard-gates-failed
      description: Number of gates that failed
  steps:
    - name: analyze
      image: registry.access.redhat.com/ubi9/python-311:9.6
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # --- 1. Clone pipeline repo (or update to requested revision) ---
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        if [ -d "$PIPELINE_DIR" ]; then
          echo "Pipeline repo exists, updating to requested revision"
          git -C "$PIPELINE_DIR" fetch origin "$(params.pipeline-repo-revision)" --depth 1
          git -C "$PIPELINE_DIR" -c advice.detachedHead=false checkout FETCH_HEAD
        else
          git clone --depth 1 --branch "$(params.pipeline-repo-revision)" \
            "$(params.pipeline-repo-url)" "$PIPELINE_DIR"
        fi

        cd "$PIPELINE_DIR"
        export PYTHONPATH="$PIPELINE_DIR"
        pip install --quiet --no-cache-dir pydantic scipy pyyaml

        # --- 2. Use pre-computed report or run analysis ---
        REPORT_DIR="$(workspaces.source.path)/reports/$(params.submission-name)"
        RESULTS_DIR="$(workspaces.source.path)/eval-results/$(params.submission-name)"
        EVAL_ENGINE="$(params.eval-engine)"
        mkdir -p "$REPORT_DIR"

        if [ -f "$REPORT_DIR/report.json" ]; then
          echo "=== report.json already exists (computed by remote eval Pod) ==="
          python3 -c "
        import json, sys
        r = json.load(open(sys.argv[1]))
        s = r.get('summary', {})
        t = s.get('treatment', {})
        print(f\"Recommendation: {s.get('recommendation', 'N/A')}\")
        print(f\"Mean reward: {t.get('mean_reward', 'N/A')}\")
        print(f\"Trials: {t.get('n_trials', 0)}\")
        print(f\"Pass rate: {t.get('pass_rate', 'N/A')}\")
        " "$REPORT_DIR/report.json"
        else
          echo "=== No pre-computed report, running analyze.py locally ==="
          ARGS=(
            --results-dir "$RESULTS_DIR"
            --output-dir "$REPORT_DIR"
            --submission-name "$(params.submission-name)"
            --threshold "$(params.uplift-threshold)"
            --eval-engine "$EVAL_ENGINE"
          )
          [ -n "$(params.commit-sha)" ] && ARGS+=(--commit-sha "$(params.commit-sha)")
          [ -n "$(params.pipeline-run-id)" ] && ARGS+=(--pipeline-run-id "$(params.pipeline-run-id)")
          [ -n "$(params.harbor-fork-revision)" ] && ARGS+=(--harbor-fork-revision "$(params.harbor-fork-revision)")
          python scripts/analyze.py "${ARGS[@]}"
        fi

        # --- 3. Enrich report with PR/LLM metadata (ASE mode) ---
        PR_URL=""
        if [ -n "$(params.repo-name)" ] && [ -n "$(params.pr-number)" ]; then
          PR_URL="https://github.com/$(params.repo-name)/pull/$(params.pr-number)"
        fi
        LLM_LABEL=""
        case "$(params.llm-model)" in
          claude-sonnet*) LLM_LABEL="Claude Sonnet 4.6 (vertex_ai)" ;;
          claude-haiku*) LLM_LABEL="Claude Haiku 3.5 (vertex_ai)" ;;
          ?*) LLM_LABEL="$(params.llm-model)" ;;
        esac

        if [ "$EVAL_ENGINE" = "ase" ] && { [ -n "$PR_URL" ] || [ -n "$LLM_LABEL" ]; }; then
          echo "Enriching ASE report with PR/LLM metadata..."
          python3 -c "import json;from pathlib import Path;import sys;p=Path(sys.argv[1])/'report.json';r=json.loads(p.read_text());r.setdefault('summary',{});sys.argv[2] and r['summary'].update({'related_pr':sys.argv[2]});sys.argv[3] and r['summary'].update({'llm':sys.argv[3]});p.write_text(json.dumps(r,indent=2))" "$REPORT_DIR" "$PR_URL" "$LLM_LABEL"
        fi

        # --- 4. Enrich with security scan results (ASE/both only) ---
        if [ "$EVAL_ENGINE" != "harbor" ] && [ "$(params.security-scan-mode)" != "disabled" ] && [ -f "$REPORT_DIR/security-scan.json" ]; then
          echo "Enriching report with security scan results..."
          python3 -c "import json;from pathlib import Path;import sys;d=Path(sys.argv[1]);m=sys.argv[2];r=json.loads((d/'report.json').read_text());s=json.loads((d/'security-scan.json').read_text());f=[{'rule_id':x.get('rule_id','?'),'severity':x.get('severity','info').lower(),'message':x.get('message',''),'scanner':'cisco'} for x in s.get('findings',[])];p=m!='block' or sum(1 for x in f if x['severity'] in('critical','high'))==0;r.setdefault('security_scans',[]).append({'scanner':'cisco','scan_mode':m,'findings':f,'passed':p});(d/'report.json').write_text(json.dumps(r,indent=2));print(f'Added {len(f)} findings')" "$REPORT_DIR" "$(params.security-scan-mode)"
        fi

        # --- 5. Regenerate markdown from enriched JSON (ASE/both only) ---
        if [ "$EVAL_ENGINE" != "harbor" ] && [ "$EVAL_ENGINE" != "a2a" ]; then
          echo "Regenerating report.md from enriched JSON..."
          python3 -c "import sys;sys.path.insert(0,'$PIPELINE_DIR');from pathlib import Path;from abevalflow.report import AnalysisResult;from scripts.analyze import render_markdown;d=Path(sys.argv[1]);r=AnalysisResult.model_validate_json((d/'report.json').read_text());(d/'report.md').write_text(render_markdown(r))" "$REPORT_DIR"
        fi

        # --- 6. Extract results for Tekton ---
        echo -n "$REPORT_DIR" > "$(results.report-path.path)"

        python3 -c "import json,sys;r=json.loads(open(sys.argv[1]).read());s=r['summary'];open(sys.argv[2],'w').write(s['recommendation']);t,c=s['treatment'].get('mean_reward'),s['control'].get('mean_reward');open(sys.argv[3],'w').write(f'{t:.4f}' if t is not None else 'N/A');open(sys.argv[4],'w').write(f'{c:.4f}' if c is not None else 'N/A');g=s.get('mean_reward_gap');open(sys.argv[5],'w').write(f'{g:+.4f}' if g is not None else 'N/A');tt,fi=s.get('ttest_p_value'),s.get('fisher_p_value');open(sys.argv[6],'w').write(f'{tt:.4f}' if tt is not None else 'N/A');open(sys.argv[7],'w').write(f'{fi:.4f}' if fi is not None else 'N/A')" \
          "$REPORT_DIR/report.json" \
          "$(results.recommendation.path)" \
          "$(results.treatment-mean-reward.path)" \
          "$(results.control-mean-reward.path)" \
          "$(results.mean-reward-gap.path)" \
          "$(results.ttest-p-value.path)" \
          "$(results.fisher-p-value.path)"

        echo "=== Analysis complete ==="
        echo "Report: $REPORT_DIR"
        cat "$REPORT_DIR/report.md" 2>/dev/null || echo "(report.md not available)"

    - name: aggregate-scorecard
      image: registry.access.redhat.com/ubi9/python-311:9.6
      env:
        - name: COMPASS_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: compass-facts-api
              key: token
              optional: true
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        ENABLE_SCORECARD="$(params.enable-scorecard)"
        if [ "$ENABLE_SCORECARD" != "true" ]; then
          echo "Scorecard aggregation disabled, skipping"
          echo -n "skipped" > "$(results.scorecard-recommendation.path)"
          echo -n "0" > "$(results.scorecard-gates-passed.path)"
          echo -n "0" > "$(results.scorecard-gates-failed.path)"
          exit 0
        fi

        echo "=== Aggregating Unified Scorecard ==="

        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        cd "$PIPELINE_DIR"
        export PYTHONPATH="$PIPELINE_DIR"
        pip install --quiet --no-cache-dir pydantic pyyaml

        SUBMISSION_DIR="$(workspaces.source.path)/submissions/$(params.submission-name)"
        RESULTS_DIR="$(workspaces.source.path)/eval-results/$(params.submission-name)"
        REPORT_DIR="$(workspaces.source.path)/reports/$(params.submission-name)"
        WORKSPACE_ROOT="$(workspaces.source.path)"

        SCORECARD_ARGS=(
          --submission-dir "$SUBMISSION_DIR"
          --results-dir "$RESULTS_DIR"
          --reports-dir "$REPORT_DIR"
          --workspace-root "$WORKSPACE_ROOT"
          --eval-engine "$(params.eval-engine)"
          --pipeline-run-id "$(params.pipeline-run-id)"
        )
        if [ -n "$(params.certification-profile)" ]; then
          SCORECARD_ARGS+=(--certification-profile "$(params.certification-profile)")
        fi
        python scripts/aggregate_scorecard.py "${SCORECARD_ARGS[@]}"

        if [ -f "$REPORT_DIR/scorecard.json" ]; then
          echo ""
          echo "Scorecard written to $REPORT_DIR/scorecard.json"
          python3 -m json.tool "$REPORT_DIR/scorecard.json" 2>/dev/null | head -30 || true
          echo "..."
          
          python3 -c "import json,sys;sc=json.load(open(sys.argv[1]));open(sys.argv[2],'w').write(sc['recommendation']);open(sys.argv[3],'w').write(str(sc['gates_passed']));open(sys.argv[4],'w').write(str(sc['gates_failed']))" \
            "$REPORT_DIR/scorecard.json" \
            "$(results.scorecard-recommendation.path)" \
            "$(results.scorecard-gates-passed.path)" \
            "$(results.scorecard-gates-failed.path)"
        else
          echo "WARNING: scorecard.json not created"
          echo -n "error" > "$(results.scorecard-recommendation.path)"
          echo -n "0" > "$(results.scorecard-gates-passed.path)"
          echo -n "0" > "$(results.scorecard-gates-failed.path)"
        fi

        echo "=== Scorecard aggregation complete ==="

    - name: check-degradation
      image: registry.access.redhat.com/ubi9/python-311:9.6
      env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ab-eval-db-credentials
              key: database-url
              optional: true
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: monitoring-slack-webhook
              key: webhook-url
              optional: true
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        write_skip_results() {
          echo "false" > "$(results.degraded.path)"
          echo "$1" > "$(results.message.path)"
        }

        if [ "$(params.enable-degradation-check)" != "true" ]; then
          echo "Degradation check disabled (enable-degradation-check != true)"
          write_skip_results "Degradation check disabled"
          exit 0
        fi

        if [ -z "${DATABASE_URL:-}" ]; then
          echo "WARNING: DATABASE_URL not configured, skipping degradation check"
          write_skip_results "DB not configured"
          exit 0
        fi

        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        if [ ! -d "$PIPELINE_DIR" ]; then
          echo "Pipeline repo missing after analyze step, skipping degradation check"
          write_skip_results "Pipeline repo unavailable"
          exit 0
        fi

        echo "=== Degradation Check ==="
        echo "Submission: $(params.submission-name)"
        echo "Pipeline Run: $(params.pipeline-run-id)"
        echo "Threshold: $(params.degradation-threshold)"

        pip install --quiet --no-cache-dir sqlalchemy "psycopg[binary]" "tenacity>=8.2" scipy pydantic pyyaml

        cd "$PIPELINE_DIR"
        export PYTHONPATH="$PIPELINE_DIR"

        MONITOR_OUTPUT=/tmp/monitor_result.json

        REPORT_DIR="$(workspaces.source.path)/reports/$(params.submission-name)"
        CURRENT_SCORE=$(python3 -c "import json,sys;r=json.load(open(sys.argv[1]));s=r.get('summary',{});t=s.get('treatment',{}).get('mean_reward');print(t if t is not None else s.get('treatment_pass_rate',0.0))" "$REPORT_DIR/report.json" 2>/dev/null || echo "0.0")

        MONITOR_EXIT=0
        python scripts/monitor.py \
          --submission-name "$(params.submission-name)" \
          --threshold "$(params.degradation-threshold)" \
          --db-url "$DATABASE_URL" \
          --current-score "$CURRENT_SCORE" \
          --eval-engine "$(params.eval-engine)" \
          --run-id "$(params.pipeline-run-id)" \
          --output "$MONITOR_OUTPUT" || MONITOR_EXIT=$?
        if [ "$MONITOR_EXIT" -eq 2 ]; then
          echo "Monitor errored (non-blocking), continuing"
          write_skip_results "Monitor errored"
          exit 0
        fi

        cat "$MONITOR_OUTPUT"

        if [ -f "$REPORT_DIR/report.json" ]; then
          echo "Merging degradation results into report.json..."
          python scripts/analyze.py \
            --merge-degradation-from "$MONITOR_OUTPUT" \
            --report-json "$REPORT_DIR/report.json"
        else
          echo "WARNING: report.json not found at $REPORT_DIR/report.json, skipping merge"
        fi

        DEGRADED=$(python3 -c "import json; print(json.load(open('$MONITOR_OUTPUT'))['degraded'])")
        MESSAGE=$(python3 -c "import json; print(json.load(open('$MONITOR_OUTPUT'))['message'])")

        echo "$DEGRADED" > "$(results.degraded.path)"
        echo "$MESSAGE" > "$(results.message.path)"

        if [ "$DEGRADED" = "True" ]; then
          echo ""
          echo "!!! DEGRADATION DETECTED !!!"
          echo ""
        fi

        if [ -n "${SLACK_WEBHOOK_URL:-}" ] && [ "$SLACK_WEBHOOK_URL" != "https://hooks.slack.com/services/REPLACE/WITH/ACTUAL_WEBHOOK" ]; then
          PIPELINE_RUN_URL="$(params.openshift-console-url)/k8s/ns/ab-eval-flow/tekton.dev~v1~PipelineRun/$(params.pipeline-run-id)"

          python scripts/alert.py \
            --payload "$MONITOR_OUTPUT" \
            --webhook-url "$SLACK_WEBHOOK_URL" \
            --pipeline-run-url "$PIPELINE_RUN_URL" \
            --eval-engine "$(params.eval-engine)" || {
              echo "Failed to send Slack alert (continuing anyway)"
            }
        else
          echo "Slack webhook not configured, skipping alert"
        fi

        if [ "$DEGRADED" != "True" ]; then
          echo "No degradation detected"
        fi

        echo ""
        echo "=== Check complete ==="
