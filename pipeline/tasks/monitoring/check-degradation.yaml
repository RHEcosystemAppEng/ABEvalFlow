apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: check-degradation
  namespace: ab-eval-flow
  labels:
    app.kubernetes.io/version: "0.1"
    app.kubernetes.io/name: abevalflow
    app.kubernetes.io/component: monitoring
spec:
  description: >-
    Check for performance degradation by comparing the current evaluation
    result against previous runs. Sends a Slack alert if degradation is
    detected. This task is non-blocking (always succeeds).
  params:
    - name: submission-name
      type: string
      description: The skill/submission name to check
    - name: pipeline-run-id
      type: string
      description: Current pipeline run ID (for logging)
    - name: threshold
      type: string
      default: "0.85"
      description: >-
        Degradation threshold as a ratio. Alert if current/previous < threshold.
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
    - name: pipeline-repo-revision
      type: string
      default: "main"
    - name: openshift-console-url
      type: string
      default: "https://console-openshift-console.apps.cn-ai-lab.2vn8.p1.openshiftapps.com"
      description: Base URL for OpenShift console (for Slack message links)
  results:
    - name: degraded
      description: Whether degradation was detected (true or false)
    - name: message
      description: Human-readable result message
  steps:
    - name: clone-scripts
      image: registry.access.redhat.com/ubi9/python-311:9.6
      script: |
        #!/bin/bash
        set -e
        git clone --depth 1 --branch "$(params.pipeline-repo-revision)" \
          "$(params.pipeline-repo-url)" /workspace/pipeline
      volumeMounts:
        - name: scripts
          mountPath: /workspace/pipeline

    - name: check-and-alert
      image: python:3.12-slim
      env:
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: ab-eval-db-credentials
              key: database-url
              optional: true
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: monitoring-slack-webhook
              key: webhook-url
              optional: true
      script: |
        #!/bin/bash
        set -e

        echo "=== Degradation Check ==="
        echo "Submission: $(params.submission-name)"
        echo "Pipeline Run: $(params.pipeline-run-id)"
        echo "Threshold: $(params.threshold)"

        # Check if DB_URL is configured
        if [ -z "$DB_URL" ]; then
          echo "DB_URL not configured, skipping degradation check"
          echo "false" > $(results.degraded.path)
          echo "DB not configured" > $(results.message.path)
          exit 0
        fi

        # Install dependencies
        pip install --quiet sqlalchemy 'psycopg[binary]' tenacity

        cd /workspace/pipeline
        export PYTHONPATH=/workspace/pipeline

        # Run monitor.py
        MONITOR_OUTPUT=/tmp/monitor_result.json

        python scripts/monitor.py \
          --submission-name "$(params.submission-name)" \
          --threshold "$(params.threshold)" \
          --db-url "$DB_URL" \
          --output "$MONITOR_OUTPUT" || {
            echo "Monitor check failed, but continuing (non-blocking)"
            echo "false" > $(results.degraded.path)
            echo "Monitor check failed" > $(results.message.path)
            exit 0
          }

        # Read results
        cat "$MONITOR_OUTPUT"

        DEGRADED=$(python -c "import json; print(json.load(open('$MONITOR_OUTPUT'))['degraded'])")
        MESSAGE=$(python -c "import json; print(json.load(open('$MONITOR_OUTPUT'))['message'])")

        echo "$DEGRADED" > $(results.degraded.path)
        echo "$MESSAGE" > $(results.message.path)

        if [ "$DEGRADED" = "True" ]; then
          echo ""
          echo "!!! DEGRADATION DETECTED !!!"
          echo ""

          # Send Slack alert if webhook is configured
          if [ -n "$SLACK_WEBHOOK_URL" ] && [ "$SLACK_WEBHOOK_URL" != "https://hooks.slack.com/services/REPLACE/WITH/ACTUAL_WEBHOOK" ]; then
            PIPELINE_RUN_URL="$(params.openshift-console-url)/k8s/ns/ab-eval-flow/tekton.dev~v1~PipelineRun/$(params.pipeline-run-id)"

            python scripts/alert.py \
              --payload "$MONITOR_OUTPUT" \
              --webhook-url "$SLACK_WEBHOOK_URL" \
              --pipeline-run-url "$PIPELINE_RUN_URL" || {
                echo "Failed to send Slack alert (continuing anyway)"
              }
          else
            echo "Slack webhook not configured, skipping alert"
          fi
        else
          echo "No degradation detected"
        fi

        echo ""
        echo "=== Check complete ==="
      volumeMounts:
        - name: scripts
          mountPath: /workspace/pipeline
  volumes:
    - name: scripts
      emptyDir: {}
