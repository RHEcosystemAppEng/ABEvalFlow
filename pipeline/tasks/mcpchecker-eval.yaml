apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: mcpchecker-eval
  namespace: ab-eval-flow
  labels:
    app.kubernetes.io/version: "0.1"
    app.kubernetes.io/name: abevalflow
    app.kubernetes.io/component: evaluation
spec:
  description: >-
    Run MCPChecker evaluation against an MCP server/agent.
    MCPChecker tests MCP servers by having AI agents complete real tasks
    and verifying tool usage and output correctness via LLM judge.
  params:
    - name: submission-dir
      type: string
      description: Path to submission directory under workspace
    - name: submission-name
      type: string
      description: Name of the submission being evaluated
    - name: agent-model
      type: string
      default: "google:gemini-2.5-flash"
      description: LLM model for the agent (provider:model format)
    - name: judge-model
      type: string
      default: "openai:gpt-4o"
      description: LLM model for the LLM judge verification
    - name: pipeline-run-id
      type: string
      description: Pipeline run ID for provenance
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
      description: URL of the ABEvalFlow pipeline repository
    - name: pipeline-repo-revision
      type: string
      default: "main"
      description: Branch or SHA of the pipeline repo
    - name: task-timeout
      type: string
      default: "10m"
      description: Timeout for each MCPChecker task
  workspaces:
    - name: source
      description: Workspace containing the cloned submissions repository
  results:
    - name: overall-score
      description: Overall score (0.0 - 1.0)
    - name: passed-tasks
      description: Number of tasks that passed
    - name: total-tasks
      description: Total number of tasks
    - name: recommendation
      description: Pass or fail recommendation
    - name: report-path
      description: Path to the generated report
  steps:
    - name: clone-pipeline-repo
      image: registry.access.redhat.com/ubi9/python-311:9.6
      script: |
        #!/bin/bash
        set -euo pipefail
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        if [ -d "$PIPELINE_DIR/.git" ]; then
          echo "Pipeline repo already cloned, skipping"
          exit 0
        fi
        git clone --depth 1 --branch "$(params.pipeline-repo-revision)" \
          "$(params.pipeline-repo-url)" "$PIPELINE_DIR"
        echo "Cloned pipeline repo at $(params.pipeline-repo-revision)"

    - name: run-mcpchecker
      image: quay.io/rhecosystemappeng/mcpchecker-runner:latest
      env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-credentials
              key: api-key
              optional: true
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: google-credentials
              key: api-key
              optional: true
        - name: LITELLM_PROXY_URL
          value: "http://litellm.ab-eval-flow.svc:4000/v1"
      workingDir: $(workspaces.source.path)/submissions/$(params.submission-dir)
      script: |
        #!/bin/bash
        set -euo pipefail

        echo "=== MCPChecker Evaluation ==="
        echo "Submission: $(params.submission-name)"
        echo "Agent model: $(params.agent-model)"
        echo "Judge model: $(params.judge-model)"
        echo "Working directory: $(pwd)"

        # Verify required files exist
        if [ ! -f "eval.yaml" ]; then
          echo "ERROR: eval.yaml not found"
          exit 1
        fi
        if [ ! -f "mcp-config.yaml" ]; then
          echo "ERROR: mcp-config.yaml not found"
          exit 1
        fi

        # Set up LLM environment based on model provider
        AGENT_MODEL="$(params.agent-model)"
        JUDGE_MODEL="$(params.judge-model)"

        # If using litellm proxy, set base URL
        if [ -n "$LITELLM_PROXY_URL" ]; then
          export OPENAI_BASE_URL="$LITELLM_PROXY_URL"
          echo "Using LiteLLM proxy at $LITELLM_PROXY_URL"
        fi

        # Run MCPChecker
        echo ""
        echo "Running mcpchecker check..."
        OUTPUT_FILE="/tmp/mcpchecker-$(params.submission-name)-out.json"

        mcpchecker check eval.yaml \
          --output "$OUTPUT_FILE" \
          --timeout "$(params.task-timeout)" \
          || {
            echo "MCPChecker completed with some failures (continuing)"
          }

        # Copy output to workspace
        RESULTS_DIR="$(workspaces.source.path)/eval-results/$(params.submission-name)"
        mkdir -p "$RESULTS_DIR"
        cp "$OUTPUT_FILE" "$RESULTS_DIR/"

        echo ""
        echo "MCPChecker output saved to $RESULTS_DIR/"
        echo "=== MCPChecker execution complete ==="

    - name: aggregate-results
      image: registry.access.redhat.com/ubi9/python-311:9.6
      script: |
        #!/bin/bash
        set -euo pipefail

        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        export PYTHONPATH="$PIPELINE_DIR"

        pip install --quiet pydantic pyyaml

        RESULTS_DIR="$(workspaces.source.path)/eval-results/$(params.submission-name)"
        REPORTS_DIR="$(workspaces.source.path)/reports/$(params.submission-name)"
        OUTPUT_FILE="$RESULTS_DIR/mcpchecker-$(params.submission-name)-out.json"

        echo "Aggregating MCPChecker results..."

        python "$PIPELINE_DIR/scripts/aggregate_mcpchecker.py" \
          --output-json "$OUTPUT_FILE" \
          --submission-name "$(params.submission-name)" \
          --report-dir "$REPORTS_DIR" \
          --pipeline-run-id "$(params.pipeline-run-id)" \
          > /tmp/aggregate_output.json

        # Extract results for Tekton
        cat /tmp/aggregate_output.json

        OVERALL_SCORE=$(python -c "import json; d=json.load(open('/tmp/aggregate_output.json')); print(d.get('overall_score', 0))")
        PASSED_TASKS=$(python -c "import json; d=json.load(open('/tmp/aggregate_output.json')); print(d.get('passed_tasks', 0))")
        TOTAL_TASKS=$(python -c "import json; d=json.load(open('/tmp/aggregate_output.json')); print(d.get('total_tasks', 0))")
        RECOMMENDATION=$(python -c "import json; d=json.load(open('/tmp/aggregate_output.json')); print(d.get('recommendation', 'fail'))")
        REPORT_PATH=$(python -c "import json; d=json.load(open('/tmp/aggregate_output.json')); print(d.get('report_path', ''))")

        echo "$OVERALL_SCORE" > $(results.overall-score.path)
        echo "$PASSED_TASKS" > $(results.passed-tasks.path)
        echo "$TOTAL_TASKS" > $(results.total-tasks.path)
        echo "$RECOMMENDATION" > $(results.recommendation.path)
        echo "$REPORT_PATH" > $(results.report-path.path)

        echo ""
        echo "=== Aggregation complete ==="
        echo "Score: $OVERALL_SCORE ($PASSED_TASKS/$TOTAL_TASKS)"
        echo "Recommendation: $RECOMMENDATION"
