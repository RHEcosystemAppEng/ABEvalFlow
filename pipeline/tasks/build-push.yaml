apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-push-images
  namespace: ab-eval-flow
spec:
  description: >-
    Builds treatment and control container images from scaffolded directories
    using Buildah (rootless, daemonless) and pushes them to the OpenShift
    internal registry. A shared base image is built first (heavy layers like
    uv and claude-code) so variant builds only COPY submission-specific files.
    SETFCAP capability is required for rootless Buildah (newuidmap/newgidmap).
  params:
    - name: submission-name
      type: string
      description: >-
        Submission name used for image tagging and registry path
    - name: treatment-task-dir
      type: string
      description: Path to the scaffolded treatment task directory
    - name: control-task-dir
      type: string
      description: Path to the scaffolded control task directory
    - name: commit-sha
      type: string
      description: Git commit SHA used for image tagging
    - name: registry-url
      type: string
      default: "image-registry.openshift-image-registry.svc:5000"
      description: Container registry URL
    - name: registry-namespace
      type: string
      default: "ab-eval-flow"
      description: Registry namespace / project name
    - name: pipeline-repo-dir
      type: string
      default: "_pipeline"
      description: Directory name of the cloned pipeline repo within the workspace
    - name: llm-agent-wrapper
      type: string
      default: ""
      description: >-
        If empty, claude-code is used as agent and pre-installed in the base
        image. If set (e.g. opencode), claude-code installation is skipped.
  workspaces:
    - name: source
      description: Workspace containing the scaffolded task directories
  results:
    - name: treatment-image-ref
      description: Digest-based reference for the treatment image
    - name: control-image-ref
      description: Digest-based reference for the control image
  steps:
    - name: build-base
      image: registry.access.redhat.com/ubi9/buildah:9.6
      securityContext:
        capabilities:
          add: ["SETFCAP"]
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        REGISTRY="$(params.registry-url)"
        NS="$(params.registry-namespace)"
        NAME="$(params.submission-name)"
        SHA="$(params.commit-sha)"
        BASE_TAG="${REGISTRY}/${NS}/${NAME}:base-${SHA}"
        PIPELINE_DIR="$(workspaces.source.path)/$(params.pipeline-repo-dir)"
        DOCKERFILE="${PIPELINE_DIR}/templates/Dockerfile.base"

        INSTALL_CLAUDE="false"
        if [ -z "$(params.llm-agent-wrapper)" ]; then
          INSTALL_CLAUDE="true"
        fi

        buildah login \
          --tls-verify=false \
          -u serviceaccount \
          -p "$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
          "$REGISTRY"

        echo "=== Building base image (INSTALL_CLAUDE_CODE=${INSTALL_CLAUDE}) ==="
        buildah build \
          --storage-driver=vfs \
          --build-arg "INSTALL_CLAUDE_CODE=${INSTALL_CLAUDE}" \
          -f "$DOCKERFILE" \
          -t "$BASE_TAG" \
          "$PIPELINE_DIR/templates"

        buildah push \
          --storage-driver=vfs \
          --tls-verify=false \
          --digestfile /tmp/base-digest \
          "$BASE_TAG" \
          "docker://$BASE_TAG"

        DIGEST=$(tr -d '\n' < /tmp/base-digest)
        BASE_REF="${REGISTRY}/${NS}/${NAME}@${DIGEST}"
        echo -n "$BASE_REF" > /tmp/base-image-ref
        echo "Pushed base image: $BASE_REF"

    - name: build-push-treatment
      image: registry.access.redhat.com/ubi9/buildah:9.6
      securityContext:
        capabilities:
          add: ["SETFCAP"]
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        BASE_REF=$(cat /tmp/base-image-ref)
        REGISTRY="$(params.registry-url)"
        NS="$(params.registry-namespace)"
        NAME="$(params.submission-name)"
        SHA="$(params.commit-sha)"
        IMAGE_TAG="${REGISTRY}/${NS}/${NAME}:treatment-${SHA}"
        CONTEXT="$(params.treatment-task-dir)/environment"

        buildah login \
          --tls-verify=false \
          -u serviceaccount \
          -p "$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
          "$REGISTRY"

        echo "=== Building treatment (FROM ${BASE_REF}) ==="
        buildah build \
          --storage-driver=vfs \
          --tls-verify=false \
          --build-arg "BASE_IMAGE=${BASE_REF}" \
          -t "$IMAGE_TAG" \
          "$CONTEXT"

        buildah push \
          --storage-driver=vfs \
          --tls-verify=false \
          --digestfile /tmp/treatment-digest \
          "$IMAGE_TAG" \
          "docker://$IMAGE_TAG"

        DIGEST=$(tr -d '\n' < /tmp/treatment-digest)
        IMAGE_REF="${REGISTRY}/${NS}/${NAME}@${DIGEST}"
        echo -n "$IMAGE_REF" > "$(results.treatment-image-ref.path)"
        echo "Pushed treatment image: $IMAGE_REF"

    - name: build-push-control
      image: registry.access.redhat.com/ubi9/buildah:9.6
      securityContext:
        capabilities:
          add: ["SETFCAP"]
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        BASE_REF=$(cat /tmp/base-image-ref)
        REGISTRY="$(params.registry-url)"
        NS="$(params.registry-namespace)"
        NAME="$(params.submission-name)"
        SHA="$(params.commit-sha)"
        IMAGE_TAG="${REGISTRY}/${NS}/${NAME}:control-${SHA}"
        CONTEXT="$(params.control-task-dir)/environment"

        buildah login \
          --tls-verify=false \
          -u serviceaccount \
          -p "$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
          "$REGISTRY"

        echo "=== Building control (FROM ${BASE_REF}) ==="
        buildah build \
          --storage-driver=vfs \
          --tls-verify=false \
          --build-arg "BASE_IMAGE=${BASE_REF}" \
          -t "$IMAGE_TAG" \
          "$CONTEXT"

        buildah push \
          --storage-driver=vfs \
          --tls-verify=false \
          --digestfile /tmp/control-digest \
          "$IMAGE_TAG" \
          "docker://$IMAGE_TAG"

        DIGEST=$(tr -d '\n' < /tmp/control-digest)
        IMAGE_REF="${REGISTRY}/${NS}/${NAME}@${DIGEST}"
        echo -n "$IMAGE_REF" > "$(results.control-image-ref.path)"
        echo "Pushed control image: $IMAGE_REF"
