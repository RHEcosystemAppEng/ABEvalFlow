apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: security-scan
  namespace: ab-eval-flow
spec:
  description: >-
    Runs Cisco AI Defense skill-scanner as part of the security scanning phase.
    Triggered when security_scan mode is not 'disabled'. Checks for prompt
    injection, data exfiltration, and malicious code patterns. Future scanners
    (Snyk, etc.) follow the same pattern.
  params:
    - name: submission-dir
      type: string
      description: Path to the submission directory within the workspace
    - name: submission-name
      type: string
      description: Validated submission name (from metadata.yaml) for report path
    - name: pipeline-scan-mode
      type: string
      default: ""
      description: >-
        Pipeline-level scan mode override. Empty uses submission preference.
    - name: submission-scan-mode
      type: string
      default: "warn"
      description: >-
        Submission's preferred scan mode from metadata.yaml.
    - name: use-llm
      type: string
      default: "true"
      description: >-
        Enable LLM-based semantic analysis (true/false).
    - name: llm-api-base
      type: string
      default: "http://litellm.ab-eval-flow.svc:4000/v1"
      description: LLM API base URL for semantic analysis.
    - name: llm-api-key
      type: string
      default: ""
      description: "LLM API key. If empty, auto-generated from PipelineRun name for correlation."
    - name: llm-model
      type: string
      default: "claude-sonnet"
      description: LLM model name for semantic analysis (e.g. claude-sonnet, claude-haiku).
    - name: report-prefix
      type: string
      description: MinIO report prefix (YYYYMMDD_HHMMSS_submissionname_runid).
    - name: pipeline-run-name
      type: string
      description: PipelineRun name for DB record.
    - name: minio-endpoint
      type: string
      default: "minio.ab-eval-flow.svc:9000"
      description: MinIO endpoint.
    - name: minio-bucket
      type: string
      default: "ab-eval-reports"
      description: MinIO bucket for reports.
  workspaces:
    - name: source
      description: Workspace containing the cloned submissions repository
  results:
    - name: findings-count
      description: Total number of security findings
    - name: critical-findings
      description: Number of CRITICAL severity findings
    - name: high-findings
      description: Number of HIGH severity findings
    - name: passed
      description: Whether scan passed (true if no HIGH/CRITICAL in block mode, or warn mode)
    - name: effective-mode
      description: The actual scan mode used (disabled, warn, block)
  steps:
    - name: run-security-scan
      image: registry.access.redhat.com/ubi9/python-311:9.6
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # Compute effective scan mode: pipeline param takes precedence if set
        PIPELINE_MODE="$(params.pipeline-scan-mode)"
        SUBMISSION_MODE="$(params.submission-scan-mode)"

        if [ -n "$PIPELINE_MODE" ]; then
          SCAN_MODE="$PIPELINE_MODE"
          echo "Using pipeline-level scan mode: $SCAN_MODE"
        else
          SCAN_MODE="$SUBMISSION_MODE"
          echo "Using submission scan mode from metadata.yaml: $SCAN_MODE"
        fi

        # Write effective mode for downstream tasks
        echo -n "$SCAN_MODE" > "$(results.effective-mode.path)"

        # Skip if disabled
        if [ "$SCAN_MODE" = "disabled" ]; then
          echo "Security scanning is disabled, skipping"
          echo -n "0" > "$(results.findings-count.path)"
          echo -n "0" > "$(results.critical-findings.path)"
          echo -n "0" > "$(results.high-findings.path)"
          echo -n "true" > "$(results.passed.path)"
          exit 0
        fi

        SUBMISSION_PATH="$(workspaces.source.path)/submissions/$(params.submission-dir)"
        
        # ASE submissions have SKILL.md in skills/ subfolder - detect and adjust
        if [ -d "$SUBMISSION_PATH/skills" ] && [ -f "$SUBMISSION_PATH/skills/SKILL.md" ]; then
          echo "Detected ASE structure, scanning skills/ subfolder"
          SUBMISSION_PATH="$SUBMISSION_PATH/skills"
        fi
        
        # Use submission-name (from metadata.yaml) for report path to match analyze.py
        REPORT_DIR="$(workspaces.source.path)/reports/$(params.submission-name)"
        SARIF_PATH="$REPORT_DIR/security-scan.sarif"
        JSON_PATH="$REPORT_DIR/security-scan.json"

        mkdir -p "$REPORT_DIR"

        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        if [ -x "$PIPELINE_DIR/scripts/resolve_llm_api_key.sh" ]; then
          LLM_API_KEY="$("$PIPELINE_DIR/scripts/resolve_llm_api_key.sh" "$(params.llm-api-key)" "$(params.pipeline-run-name)")"
        elif [ -z "$(params.llm-api-key)" ]; then
          LLM_API_KEY="sk-run-$(params.pipeline-run-name)"
        else
          LLM_API_KEY="$(params.llm-api-key)"
        fi
        echo "Using LLM correlation key for security scan"

        echo "=== Installing Cisco skill-scanner ==="
        pip install --quiet --no-cache-dir 'cisco-ai-skill-scanner==2.0.11' 2>&1 | tail -3

        echo "=== Running Cisco skill-scanner ==="
        echo "Submission: $SUBMISSION_PATH"
        echo "Mode: $SCAN_MODE"
        echo "Output: $JSON_PATH"
        echo ""
        echo "Files to scan:"
        find "$SUBMISSION_PATH" -type f \( -name "*.md" -o -name "*.py" -o -name "*.yaml" -o -name "*.json" \) | head -10 | sed 's/^/  /'
        FILE_COUNT=$(find "$SUBMISSION_PATH" -type f \( -name "*.md" -o -name "*.py" -o -name "*.yaml" -o -name "*.json" \) | wc -l | tr -d ' ')
        echo "  ($FILE_COUNT files total)"
        echo ""

        START_TIME=$(date +%s)

        # Build scanner command with native --fail-on-severity for block mode
        SCANNER_CMD=(
          skill-scanner scan "$SUBMISSION_PATH"
          --format json
          --output-json "$JSON_PATH"
          --output-sarif "$SARIF_PATH"
          --lenient
          --verbose
        )

        # In block mode, use scanner's native fail-on-severity flag
        if [ "$SCAN_MODE" = "block" ]; then
          SCANNER_CMD+=(--fail-on-severity high)
        fi

        # Add LLM-based semantic analysis if enabled
        USE_LLM="$(params.use-llm)"
        if [ "$USE_LLM" = "true" ]; then
          echo "LLM semantic analysis enabled"
          SCANNER_CMD+=(--use-llm)
          # Set model and API config via env vars
          # openai/ prefix tells LiteLLM library to route through OPENAI_BASE_URL
          export SKILL_SCANNER_LLM_MODEL="openai/$(params.llm-model)"
          export SKILL_SCANNER_LLM_API_KEY="$LLM_API_KEY"
          export OPENAI_API_KEY="$LLM_API_KEY"
          export OPENAI_BASE_URL="$(params.llm-api-base)"
          echo "Using LLM model: openai/$(params.llm-model)"
        fi

        # Run the scanner - capture exit code
        set +e
        "${SCANNER_CMD[@]}" 2>&1 | tee /tmp/scan-output.txt
        SCAN_EXIT=$?
        set -e

        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "Scan completed in ${DURATION}s (exit code: $SCAN_EXIT)"

        # Parse JSON results in a single Python call using env var for safe path handling
        export SCAN_JSON="$JSON_PATH"
        PARSE_OUTPUT=$(python3 -c "
        import json
        import os

        json_path = os.environ.get('SCAN_JSON', '')
        counts = {'total': 0, 'critical': 0, 'high': 0}

        try:
            with open(json_path) as f:
                data = json.load(f)
            findings = data.get('findings', [])
            counts['total'] = len(findings)
            for f in findings:
                sev = f.get('severity', '').lower()
                if sev in counts:
                    counts[sev] += 1
        except Exception as e:
            print(f'ERROR: Failed to parse JSON: {e}', file=__import__('sys').stderr)

        for k, v in counts.items():
            print(f'{k}={v}')
        ")

        # Parse the output
        FINDINGS_COUNT=$(echo "$PARSE_OUTPUT" | grep '^total=' | cut -d= -f2 || echo "0")
        CRITICAL_COUNT=$(echo "$PARSE_OUTPUT" | grep '^critical=' | cut -d= -f2 || echo "0")
        HIGH_COUNT=$(echo "$PARSE_OUTPUT" | grep '^high=' | cut -d= -f2 || echo "0")

        echo ""
        echo "=== Scan Results ==="
        echo "Findings: $FINDINGS_COUNT total"
        echo "  Critical: $CRITICAL_COUNT"
        echo "  High:     $HIGH_COUNT"
        if [ "$FINDINGS_COUNT" -gt 0 ] && [ -f "$JSON_PATH" ]; then
          echo ""
          echo "Top findings:"
          python3 - "$JSON_PATH" <<'SHOW_FINDINGS' 2>/dev/null || true
        import json, sys
        with open(sys.argv[1]) as f:
            data = json.load(f)
        for finding in data.get('findings', [])[:5]:
            sev = finding.get('severity', 'unknown').upper()
            rule = finding.get('rule_id', finding.get('id', 'unknown'))
            msg = finding.get('message', '')[:60]
            print(f'  [{sev}] {rule}: {msg}')
        SHOW_FINDINGS
        fi

        # Write results
        echo -n "$FINDINGS_COUNT" > "$(results.findings-count.path)"
        echo -n "$CRITICAL_COUNT" > "$(results.critical-findings.path)"
        echo -n "$HIGH_COUNT" > "$(results.high-findings.path)"

        # Determine pass/fail
        # Scanner crash (no JSON output) fails the task in both modes (fail-closed)
        # In block mode: also fail on HIGH/CRITICAL findings
        # In warn mode: findings are informational but scanner must succeed
        PASSED="true"

        # Check if scanner crashed (no JSON produced)
        if [ ! -f "$JSON_PATH" ]; then
          echo "ERROR: Scanner failed to produce output (exit code: $SCAN_EXIT)"
          PASSED="false"
        elif [ "$SCAN_MODE" = "block" ] && [ "$SCAN_EXIT" -ne 0 ]; then
          PASSED="false"
          echo "BLOCKING: Scanner exited with code $SCAN_EXIT (HIGH/CRITICAL findings)"
        fi

        echo -n "$PASSED" > "$(results.passed.path)"
        echo "Mode: $SCAN_MODE, Passed: $PASSED"

        # Fail the task if scanner crashed or (block mode + findings)
        if [ "$PASSED" = "false" ]; then
          echo "=== Cisco scan FAILED ==="
          exit 1
        fi

        echo "=== Cisco scan complete ==="

    - name: persist-results
      image: registry.access.redhat.com/ubi9/python-311:9.6
      env:
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: root-user
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: root-password
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: ab-eval-db-credentials
              key: database-url
              optional: true
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        REPORT_PREFIX="$(params.report-prefix)"
        SUBMISSION_NAME="$(params.submission-name)"
        PIPELINE_RUN="$(params.pipeline-run-name)"
        SCAN_MODE=$(cat "$(results.effective-mode.path)")
        
        # Skip if disabled
        if [ "$SCAN_MODE" = "disabled" ]; then
          echo "Security scanning disabled, skipping persistence"
          exit 0
        fi

        REPORT_DIR="$(workspaces.source.path)/reports/$SUBMISSION_NAME"
        export JSON_PATH="$REPORT_DIR/security-scan.json"
        export SARIF_PATH="$REPORT_DIR/security-scan.sarif"
        export REPORT_PREFIX

        # Install dependencies (psycopg for postgresql+psycopg:// URLs)
        pip install --quiet --no-cache-dir minio sqlalchemy 'psycopg[binary]'

        echo "=== Uploading to MinIO ==="
        echo "JSON_PATH: $JSON_PATH"
        echo "SARIF_PATH: $SARIF_PATH"
        echo "REPORT_PREFIX: $REPORT_PREFIX"
        python3 - <<'UPLOAD_MINIO'
        import os
        import sys
        from minio import Minio

        endpoint = "$(params.minio-endpoint)"
        bucket = "$(params.minio-bucket)"
        prefix = os.environ.get("REPORT_PREFIX", "")
        json_path = os.environ.get("JSON_PATH", "")
        sarif_path = os.environ.get("SARIF_PATH", "")

        client = Minio(
            endpoint,
            access_key=os.environ["MINIO_ACCESS_KEY"],
            secret_key=os.environ["MINIO_SECRET_KEY"],
            secure=False,
        )

        uploaded = 0
        for local_path, name in [(json_path, "security-scan.json"), (sarif_path, "security-scan.sarif")]:
            if os.path.isfile(local_path):
                object_name = f"{prefix}/security_scans/{name}"
                client.fput_object(bucket, object_name, local_path)
                print(f"Uploaded: s3://{bucket}/{object_name}")
                uploaded += 1

        print(f"Uploaded {uploaded} security scan files to MinIO")
        UPLOAD_MINIO

        echo "=== Writing to DB ==="
        export JSON_PATH SUBMISSION_NAME PIPELINE_RUN SCAN_MODE
        python3 - <<'WRITE_DB'
        import os
        import json
        import sys

        db_url = os.environ.get("DB_URL", "")
        if not db_url:
            print("DB_URL not set, skipping database write")
            sys.exit(0)

        json_path = os.environ["JSON_PATH"]
        submission_name = os.environ["SUBMISSION_NAME"]
        pipeline_run = os.environ["PIPELINE_RUN"]
        scan_mode = os.environ["SCAN_MODE"]

        # Parse scan results
        findings_count = 0
        critical_count = 0
        high_count = 0
        findings_json = None
        passed = True

        if os.path.isfile(json_path):
            with open(json_path) as f:
                data = json.load(f)
            findings = data.get("findings", [])
            findings_count = len(findings)
            findings_json = json.dumps(data)
            for finding in findings:
                sev = finding.get("severity", "").lower()
                if sev == "critical":
                    critical_count += 1
                elif sev == "high":
                    high_count += 1
            if scan_mode == "block" and (critical_count > 0 or high_count > 0):
                passed = False

        from sqlalchemy import create_engine, text
        from sqlalchemy.orm import sessionmaker
        import uuid

        engine = create_engine(db_url)
        Session = sessionmaker(bind=engine)
        session = Session()

        try:
            session.execute(
                text("""
                    INSERT INTO security_scans 
                    (id, pipeline_run_id, submission_name, scanner, scan_mode, passed,
                     findings_count, critical_count, high_count, findings_json, created_at)
                    VALUES (:id, :run_id, :name, :scanner, :mode, :passed,
                            :findings, :critical, :high, :json, NOW())
                    ON CONFLICT (pipeline_run_id) DO UPDATE SET
                        findings_count = EXCLUDED.findings_count,
                        critical_count = EXCLUDED.critical_count,
                        high_count = EXCLUDED.high_count,
                        findings_json = EXCLUDED.findings_json,
                        passed = EXCLUDED.passed
                """),
                {
                    "id": str(uuid.uuid4()),
                    "run_id": pipeline_run,
                    "name": submission_name,
                    "scanner": "cisco",
                    "mode": scan_mode,
                    "passed": passed,
                    "findings": findings_count,
                    "critical": critical_count,
                    "high": high_count,
                    "json": findings_json,
                }
            )
            session.commit()
            print(f"Wrote SecurityScan record for {submission_name} (run: {pipeline_run})")
        except Exception as e:
            print(f"DB write failed (non-fatal): {e}", file=sys.stderr)
            session.rollback()
        finally:
            session.close()
        WRITE_DB

        echo "=== Security scan persistence complete ==="
