apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: validate-submission
  namespace: ab-eval-flow
spec:
  description: >-
    Validates a submission directory against the submission contract.
    Checks instruction.md, SKILL.md, test compilation, metadata schema, and
    supportive/ size limits. Outputs structured JSON results.
  params:
    - name: submission-dir
      type: string
      description: Path to the submission directory within the workspace (e.g. my-submission)
    - name: max-workspace-mb
      type: string
      default: "500"
      description: Maximum allowed workspace size in MB (guards against oversized submissions)
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
      description: URL of the ABEvalFlow pipeline repository
    - name: pipeline-repo-revision
      type: string
      default: "main"
      description: Branch or SHA of the pipeline repo to use for scripts
    - name: eval-engine
      type: string
      default: "harbor"
      description: >-
        Evaluation engine (harbor, ase, both). Controls which validation
        checks are run — Harbor checks require instruction.md and tests/,
        ASE checks require evals/evals.json and SKILL.md frontmatter.
    - name: pipeline-run-name
      type: string
      description: Name of the PipelineRun (for building report prefix)
  workspaces:
    - name: source
      description: Workspace containing the cloned submissions repository
  results:
    - name: validation-result
      description: JSON object with valid (bool) and errors (array)
    - name: submission-name
      description: The validated submission name (from metadata.yaml)
    - name: security-scan
      description: Security scan mode from metadata.yaml (disabled, warn, block)
    - name: security-scan-use-llm
      description: Whether to use LLM analysis in security scanning (true/false)
    - name: report-prefix
      description: >-
        MinIO report prefix (YYYYMMDD_HHMMSS_submissionname_runid) for consistent
        artifact paths across all pipeline tasks
    - name: mcp-credentials-secret
      description: >-
        Name of the secret containing MCP credentials (for MCPChecker eval).
        Empty if not using MCPChecker.
  steps:
    - name: check-workspace-size
      image: registry.access.redhat.com/ubi9/python-311:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        # Resource guard: reject oversized submissions (e.g. accidental binary
        # uploads) before they consume PVC storage and slow down the pipeline.
        # Minimum content checks (required files) are handled by validate.py.
        WORKSPACE_DIR="$(workspaces.source.path)"
        MAX_MB=$(params.max-workspace-mb)
        SIZE_KB=$(du -sk "$WORKSPACE_DIR" | cut -f1)
        SIZE_MB=$((SIZE_KB / 1024))
        if [ "$SIZE_MB" -gt "$MAX_MB" ]; then
          echo "Workspace size ${SIZE_MB}MB exceeds limit ${MAX_MB}MB"
          exit 1
        fi
        echo "Workspace size: ${SIZE_MB}MB (limit: ${MAX_MB}MB)"

    - name: clone-pipeline-repo
      image: registry.access.redhat.com/ubi9/python-311:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        if [ -d "$PIPELINE_DIR/.git" ]; then
          echo "Pipeline repo already cloned, skipping"
          exit 0
        fi
        git clone --depth 1 --branch "$(params.pipeline-repo-revision)" \
          "$(params.pipeline-repo-url)" "$PIPELINE_DIR"
        echo "Cloned pipeline repo at $(params.pipeline-repo-revision)"

    - name: validate
      image: registry.access.redhat.com/ubi9/python-311:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        SUBMISSION_PATH="$(workspaces.source.path)/submissions/$(params.submission-dir)"

        cd "$PIPELINE_DIR"
        export PYTHONPATH="$PIPELINE_DIR"
        pip install --quiet --no-cache-dir pydantic pyyaml

        # Run validation and capture output
        python scripts/validate.py "$SUBMISSION_PATH" \
          --eval-engine "$(params.eval-engine)" \
          | tee /tmp/validation-output.json

        # Write to Tekton result
        cat /tmp/validation-output.json | tr -d '\n' \
          > "$(results.validation-result.path)"

        # Also write to workspace for downstream tasks (certification levels)
        REPORTS_DIR="$(workspaces.source.path)/reports/$(params.submission-dir)"
        mkdir -p "$REPORTS_DIR"
        cp /tmp/validation-output.json "$REPORTS_DIR/validation.json"
        echo "Wrote validation results to $REPORTS_DIR/validation.json"

        VALID=$(python3 -c "import json; print(json.load(open('/tmp/validation-output.json'))['valid'])")
        if [ "$VALID" = "True" ]; then
          python3 -c "
        import yaml, sys
        meta = yaml.safe_load(open(sys.argv[1]))
        print(meta['name'], end='')
        " "$SUBMISSION_PATH/metadata.yaml" > "$(results.submission-name.path)"

          # Extract security_scan (defaults to 'warn' if not set)
          python3 -c "
        import yaml, sys
        meta = yaml.safe_load(open(sys.argv[1]))
        print(meta.get('security_scan', 'warn'), end='')
        " "$SUBMISSION_PATH/metadata.yaml" > "$(results.security-scan.path)"

          # Extract security_scan_use_llm (defaults to 'true' if not set)
          python3 -c "
        import yaml, sys
        meta = yaml.safe_load(open(sys.argv[1]))
        print(str(meta.get('security_scan_use_llm', True)).lower(), end='')
        " "$SUBMISSION_PATH/metadata.yaml" > "$(results.security-scan-use-llm.path)"

          # Generate report prefix: YYYYMMDD_HHMMSS_submissionname_runid
          SUBMISSION_NAME=$(cat "$(results.submission-name.path)")
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          REPORT_PREFIX="${TIMESTAMP}_${SUBMISSION_NAME}_$(params.pipeline-run-name)"
          echo -n "$REPORT_PREFIX" > "$(results.report-prefix.path)"
          echo "Report prefix: $REPORT_PREFIX"

          # Extract mcp.credentials_secret (for MCPChecker, empty if not set)
          python3 -c "
        import yaml, sys
        meta = yaml.safe_load(open(sys.argv[1]))
        mcp = meta.get('mcp') or {}
        print(mcp.get('credentials_secret', ''), end='')
        " "$SUBMISSION_PATH/metadata.yaml" > "$(results.mcp-credentials-secret.path)"
        else
          echo "INVALID" > "$(results.submission-name.path)"
          echo "warn" > "$(results.security-scan.path)"
          echo "false" > "$(results.security-scan-use-llm.path)"
          echo "INVALID" > "$(results.report-prefix.path)"
          echo "" > "$(results.mcp-credentials-secret.path)"
          exit 1
        fi
