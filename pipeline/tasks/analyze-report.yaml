apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: analyze-report
  namespace: ab-eval-flow
spec:
  description: >-
    Analyzes A/B evaluation results and produces JSON + Markdown reports.
    Supports Harbor results (treatment/ and control/ trial dirs), ASE
    results (pre-generated report.json from aggregate_ase.py), or both.
    Computes per-variant pass rates, uplift, and statistical significance.
    Emits a pass/fail recommendation based on a configurable uplift threshold.
  params:
    - name: submission-name
      type: string
      description: Validated submission name
    - name: eval-engine
      type: string
      default: "harbor"
      description: >-
        Evaluation engine used: 'harbor', 'ase', or 'both'. Controls which
        analysis path runs. For 'ase', reads pre-generated report from
        the reports directory. For 'harbor', runs full analysis from raw
        trial results.
    - name: commit-sha
      type: string
      default: ""
      description: Git commit SHA for provenance
    - name: pipeline-run-id
      type: string
      default: ""
      description: Tekton PipelineRun name for provenance
    - name: harbor-fork-revision
      type: string
      default: ""
      description: Harbor fork revision used for provenance
    - name: uplift-threshold
      type: string
      default: "0.0"
      description: >-
        Minimum mean-reward gap (treatment - control) for a 'pass'
        recommendation. Set to 0.0 to pass whenever treatment >= control.
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
      description: URL of the ABEvalFlow pipeline repository
    - name: pipeline-repo-revision
      type: string
      default: "main"
      description: Branch or SHA of the pipeline repo to use for scripts
    - name: security-scan-mode
      type: string
      default: "disabled"
      description: >-
        Cisco security scan mode: 'disabled', 'warn', or 'block'.
        When not disabled, includes security scan results in the report.
    - name: llm-model
      type: string
      default: ""
      description: >-
        LLM model name used for evaluation (e.g. claude-sonnet).
        Used to generate a human-readable label in the report.
    - name: repo-name
      type: string
      default: ""
      description: >-
        GitHub repo (org/name) for constructing PR URL
    - name: pr-number
      type: string
      default: ""
      description: >-
        PR number that triggered this pipeline run
  workspaces:
    - name: source
      description: Workspace containing the evaluation results and report output
  results:
    - name: recommendation
      description: "'pass' or 'fail' based on uplift threshold"
    - name: treatment-mean-reward
      description: Treatment variant mean reward as a decimal string (e.g. "0.8500")
    - name: control-mean-reward
      description: Control variant mean reward as a decimal string (e.g. "0.6000")
    - name: mean-reward-gap
      description: "Mean reward gap (treatment - control) as a signed string (e.g. \"+0.1500\")"
    - name: ttest-p-value
      description: "Welch's t-test p-value (e.g. \"0.0342\"), or \"N/A\" if not computable"
    - name: fisher-p-value
      description: "Fisher's exact test p-value (e.g. \"0.0271\"), or \"N/A\" if not computable"
    - name: report-path
      description: Path to the directory containing report.json and report.md
  steps:
    - name: run-analysis
      image: registry.access.redhat.com/ubi9/python-311:9.6
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # --- 1. Clone pipeline repo (or update to requested revision) ---
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        if [ -d "$PIPELINE_DIR" ]; then
          echo "Pipeline repo exists, updating to requested revision"
          git -C "$PIPELINE_DIR" fetch origin "$(params.pipeline-repo-revision)" --depth 1
          git -C "$PIPELINE_DIR" -c advice.detachedHead=false checkout FETCH_HEAD
        else
          git clone --depth 1 --branch "$(params.pipeline-repo-revision)" \
            "$(params.pipeline-repo-url)" "$PIPELINE_DIR"
        fi

        cd "$PIPELINE_DIR"
        export PYTHONPATH="$PIPELINE_DIR"
        pip install --quiet --no-cache-dir pydantic scipy pyyaml

        # --- 2. Run analysis based on eval engine ---
        REPORT_DIR="$(workspaces.source.path)/reports/$(params.submission-name)"
        RESULTS_DIR="$(workspaces.source.path)/eval-results/$(params.submission-name)"
        EVAL_ENGINE="$(params.eval-engine)"

        if [ "$EVAL_ENGINE" = "ase" ]; then
          # ASE: report already generated by aggregate_ase.py in ase-eval task
          echo "=== ASE mode: reading pre-generated report ==="
          if [ ! -f "$REPORT_DIR/report.json" ]; then
            echo "ERROR: ASE report.json not found at $REPORT_DIR/report.json"
            exit 1
          fi
          echo "Found ASE report at $REPORT_DIR"

          # Enrich ASE report with related_pr and llm fields
          if [ -n "$PR_URL" ] || [ -n "$LLM_LABEL" ]; then
            echo "=== Enriching ASE report with PR/LLM metadata ==="
            python3 - "$REPORT_DIR" "$PR_URL" "$LLM_LABEL" <<'ENRICH_PR_LLM'
        import json, sys
        from pathlib import Path

        report_dir, pr_url, llm_label = sys.argv[1], sys.argv[2], sys.argv[3]
        report_path = Path(report_dir) / 'report.json'
        report = json.loads(report_path.read_text())

        if 'summary' in report:
            if pr_url:
                report['summary']['related_pr'] = pr_url
            if llm_label:
                report['summary']['llm'] = llm_label
            report_path.write_text(json.dumps(report, indent=2))
            print('Enriched report with PR URL and LLM label')
        ENRICH_PR_LLM
          fi

        el        # Construct PR URL and LLM label for report metadata
        PR_URL=""
        if [ -n "$(params.repo-name)" ] && [ -n "$(params.pr-number)" ]; then
          PR_URL="https://github.com/$(params.repo-name)/pull/$(params.pr-number)"
        fi

        LLM_LABEL=""
        if [ -n "$(params.llm-model)" ]; then
          # Map model name to human-readable label
          case "$(params.llm-model)" in
            claude-sonnet*) LLM_LABEL="Claude Sonnet 4.6 (vertex_ai)" ;;
            claude-haiku*) LLM_LABEL="Claude Haiku 3.5 (vertex_ai)" ;;
            *) LLM_LABEL="$(params.llm-model)" ;;
          esac
        fi

        if [ "$EVAL_ENGINE" = "harbor" ]; then
          # Harbor: run full analysis from raw trial results
          echo "=== Harbor mode: running analysis ==="
          ARGS=(
            --results-dir "$RESULTS_DIR"
            --output-dir "$REPORT_DIR"
            --submission-name "$(params.submission-name)"
            --threshold "$(params.uplift-threshold)"
            --eval-engine harbor
            --security-scan-mode "$(params.security-scan-mode)"
          )
          if [ -n "$(params.commit-sha)" ]; then
            ARGS+=(--commit-sha "$(params.commit-sha)")
          fi
          if [ -n "$(params.pipeline-run-id)" ]; then
            ARGS+=(--pipeline-run-id "$(params.pipeline-run-id)")
          fi
          if [ -n "$(params.harbor-fork-revision)" ]; then
            ARGS+=(--harbor-fork-revision "$(params.harbor-fork-revision)")
          fi
          if [ -n "$PR_URL" ]; then
            ARGS+=(--pr-url "$PR_URL")
          fi
          if [ -n "$LLM_LABEL" ]; then
            ARGS+=(--llm-label "$LLM_LABEL")
          fi
          python scripts/analyze.py "${ARGS[@]}"

        elif [ "$EVAL_ENGINE" = "both" ]; then
          # Both: run Harbor analysis, then merge with ASE results
          echo "=== Both mode: running Harbor analysis ==="
          HARBOR_REPORT_DIR="${REPORT_DIR}/harbor"
          ARGS=(
            --results-dir "$RESULTS_DIR"
            --output-dir "$HARBOR_REPORT_DIR"
            --submission-name "$(params.submission-name)"
            --threshold "$(params.uplift-threshold)"
            --eval-engine harbor
            --security-scan-mode "$(params.security-scan-mode)"
          )
          if [ -n "$(params.commit-sha)" ]; then
            ARGS+=(--commit-sha "$(params.commit-sha)")
          fi
          if [ -n "$(params.pipeline-run-id)" ]; then
            ARGS+=(--pipeline-run-id "$(params.pipeline-run-id)")
          fi
          if [ -n "$PR_URL" ]; then
            ARGS+=(--pr-url "$PR_URL")
          fi
          if [ -n "$LLM_LABEL" ]; then
            ARGS+=(--llm-label "$LLM_LABEL")
          fi
          python scripts/analyze.py "${ARGS[@]}"

          echo "=== Both mode: ASE report already at $REPORT_DIR ==="
        fi

        # --- 2b. Enrich report with security scan results (ASE/both only) ---
        # Harbor mode already includes security_scans via scripts/analyze.py.
        # This step enriches pre-generated ASE reports that bypass analyze.py.
        CISCO_SCAN_MODE="$(params.security-scan-mode)"
        if [ "$EVAL_ENGINE" != "harbor" ] && [ "$CISCO_SCAN_MODE" != "disabled" ] && [ -f "$REPORT_DIR/security-scan.json" ]; then
          echo "=== Enriching report with security scan results ==="
          python3 -c "import json,sys;from pathlib import Path;d,m=Path(sys.argv[1]),sys.argv[2];rp,sp=d/'report.json',d/'security-scan.json';r,s=json.loads(rp.read_text()),json.loads(sp.read_text()) if rp.exists() and sp.exists() else (sys.exit(0),None);f=[{'rule_id':x.get('rule_id',x.get('id','?')),'severity':x.get('severity','info').lower(),'message':x.get('message',''),'scanner':'cisco'} for x in s.get('findings',[])];p=m!='block' or sum(1 for x in f if x['severity'] in('critical','high'))==0;r.setdefault('security_scans',[]).append({'scanner':'cisco','scan_mode':m,'findings':f,'passed':p});rp.write_text(json.dumps(r,indent=2));print(f'Added {len(f)} findings')" "$REPORT_DIR" "$CISCO_SCAN_MODE"
          echo "Security scan data added to report.json"
        fi

        # --- 3. Extract results for Tekton ---
        echo -n "$REPORT_DIR" > "$(results.report-path.path)"

        python3 -c "import json,sys;r=json.loads(open(sys.argv[1]).read());s=r['summary'];open(sys.argv[2],'w').write(s['recommendation']);t,c=s['treatment'].get('mean_reward'),s['control'].get('mean_reward');open(sys.argv[3],'w').write(f'{t:.4f}' if t else 'N/A');open(sys.argv[4],'w').write(f'{c:.4f}' if c else 'N/A');g=s.get('mean_reward_gap');open(sys.argv[5],'w').write(f'{g:+.4f}' if g else 'N/A');tt,fi=s.get('ttest_p_value'),s.get('fisher_p_value');open(sys.argv[6],'w').write(f'{tt:.4f}' if tt else 'N/A');open(sys.argv[7],'w').write(f'{fi:.4f}' if fi else 'N/A')" \
          "$REPORT_DIR/report.json" \
          "$(results.recommendation.path)" \
          "$(results.treatment-mean-reward.path)" \
          "$(results.control-mean-reward.path)" \
          "$(results.mean-reward-gap.path)" \
          "$(results.ttest-p-value.path)" \
          "$(results.fisher-p-value.path)"

        echo "=== Analysis complete ==="
        echo "Report: $REPORT_DIR"
        cat "$REPORT_DIR/report.md"
