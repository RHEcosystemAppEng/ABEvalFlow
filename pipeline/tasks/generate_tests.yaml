apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: generate-tests
  namespace: ab-eval-flow
spec:
  description: >-
    AI-assisted generation of instruction.md and test_outputs.py from a skill
    definition.  Only runs when the submission has generation_mode: ai.
    Uses the OpenAI-compatible LLM API (works with LiteLLM proxy, direct API,
    or self-hosted models).
  params:
    - name: submission-dir
      type: string
      description: Submission directory name under submissions/
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
      description: URL of the ABEvalFlow pipeline repository
    - name: pipeline-repo-revision
      type: string
      default: "main"
      description: Branch or SHA of the pipeline repo
    - name: llm-base-url
      type: string
      default: "http://litellm.ab-eval-flow.svc:4000/v1"
      description: LLM API base URL (OpenAI-compatible)
    - name: llm-model
      type: string
      default: "claude-sonnet-4-20250514"
      description: Model identifier for the LLM
    - name: agent-type
      type: string
      default: "api"
      description: >-
        How to invoke the LLM: 'api' for direct API calls, or 'claude',
        'cursor', 'opencode' to use the respective agent CLI with native
        skill loading.
  workspaces:
    - name: source
      description: Workspace containing the cloned submissions repository
  results:
    - name: generated-files
      description: JSON array of generated file paths relative to submission dir
  steps:
    - name: clone-pipeline-repo
      image: registry.access.redhat.com/ubi9/python-311:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        if [ -d "$PIPELINE_DIR/.git" ]; then
          echo "Pipeline repo already cloned, skipping"
          exit 0
        fi
        git clone --depth 1 --branch "$(params.pipeline-repo-revision)" \
          "$(params.pipeline-repo-url)" "$PIPELINE_DIR"
        echo "Cloned pipeline repo at $(params.pipeline-repo-revision)"

    - name: generate
      image: registry.access.redhat.com/ubi9/python-311:latest
      env:
        - name: LLM_BASE_URL
          value: "$(params.llm-base-url)"
        - name: LLM_MODEL
          value: "$(params.llm-model)"
        - name: AGENT_TYPE
          value: "$(params.agent-type)"
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-credentials
              key: api-key
              optional: true
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        SUBMISSION_PATH="$(workspaces.source.path)/submissions/$(params.submission-dir)"
        WORKSPACE_DIR="$(workspaces.source.path)"

        cd "$PIPELINE_DIR"
        pip install --quiet --no-cache-dir pydantic pyyaml openai

        python scripts/generate_tests.py "$SUBMISSION_PATH" \
          --workspace-dir "$WORKSPACE_DIR" \
          --agent-type "$(params.agent-type)" \
          | tee /tmp/generate-output.json

        python -c "
        import json, sys
        data = json.load(open('/tmp/generate-output.json'))
        print(json.dumps(data.get('generated', [])), end='')
        " > "$(results.generated-files.path)"
