apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: generate-tests
  namespace: ab-eval-flow
spec:
  description: >-
    AI-assisted generation of evaluation files from a skill definition.
    For Harbor mode: generates instruction.md, test_outputs.py when generation_mode: ai.
    For ASE mode: generates evals/evals.json when missing.
    Uses the OpenAI-compatible LLM API (works with LiteLLM proxy, direct API,
    or self-hosted models).
  params:
    - name: submission-dir
      type: string
      description: Submission directory name under submissions/
    - name: eval-engine
      type: string
      default: "harbor"
      description: Evaluation engine (harbor, ase, both)
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
      description: URL of the ABEvalFlow pipeline repository
    - name: pipeline-repo-revision
      type: string
      default: "main"
      description: Branch or SHA of the pipeline repo
    - name: llm-base-url
      type: string
      default: "http://litellm.ab-eval-flow.svc:4000/v1"
      description: LLM API base URL (OpenAI-compatible)
    - name: llm-model
      type: string
      default: "claude-sonnet-4-20250514"
      description: Model identifier for the LLM
    - name: agent-type
      type: string
      default: "api"
      description: >-
        How to invoke the LLM: 'api' for direct API calls, or 'claude',
        'cursor', 'opencode' to use the respective agent CLI with native
        skill loading.
    - name: max-retries
      type: string
      default: "3"
      description: >-
        Maximum number of generate-validate retry attempts. Each failed
        attempt feeds validation errors back into the generation prompt.
  workspaces:
    - name: source
      description: Workspace containing the cloned submissions repository
  results:
    - name: generated-files
      description: JSON array of generated file paths relative to submission dir
  steps:
    - name: clone-pipeline-repo
      image: registry.access.redhat.com/ubi9/python-311:9.6
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        if [ -d "$PIPELINE_DIR/.git" ]; then
          echo "Pipeline repo already cloned, skipping"
          exit 0
        fi
        git clone --depth 1 --branch "$(params.pipeline-repo-revision)" \
          "$(params.pipeline-repo-url)" "$PIPELINE_DIR"
        echo "Cloned pipeline repo at $(params.pipeline-repo-revision)"

    - name: generate
      image: registry.access.redhat.com/ubi9/python-311:9.6
      env:
        - name: LLM_BASE_URL
          value: "$(params.llm-base-url)"
        - name: LLM_MODEL
          value: "$(params.llm-model)"
        - name: AGENT_TYPE
          value: "$(params.agent-type)"
        - name: EVAL_ENGINE
          value: "$(params.eval-engine)"
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-credentials
              key: api-key
              optional: true
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        SUBMISSION_PATH="$(workspaces.source.path)/submissions/$(params.submission-dir)"
        WORKSPACE_DIR="$(workspaces.source.path)"

        cd "$PIPELINE_DIR"
        pip install --quiet --no-cache-dir pydantic pyyaml openai pytest
        export PYTHONPATH="$PIPELINE_DIR"

        GENERATED='[]'

        # For ASE mode: generate evals.json if missing
        if [ "$EVAL_ENGINE" = "ase" ] || [ "$EVAL_ENGINE" = "both" ]; then
          if [ ! -f "$SUBMISSION_PATH/evals/evals.json" ]; then
            echo "ASE mode: evals.json missing, generating from SKILL.md..."
            python3 scripts/generate_ase_evals.py "$SUBMISSION_PATH" | tee /tmp/ase-output.json
            GENERATED=$(python3 -c "import json,sys; print(json.dumps(json.load(open('/tmp/ase-output.json')).get('generated', [])))")
          else
            echo "ASE mode: evals.json already exists, skipping generation"
          fi
        fi

        # For Harbor mode: generate instruction.md and tests if generation_mode: ai
        if [ "$EVAL_ENGINE" = "harbor" ] || [ "$EVAL_ENGINE" = "both" ]; then
          python scripts/generate_tests.py "$SUBMISSION_PATH" \
            --workspace-dir "$WORKSPACE_DIR" \
            --agent-type "$(params.agent-type)" \
            --max-retries "$(params.max-retries)" \
            | tee /tmp/generate-output.json

          HARBOR_GENERATED=$(python3 -c "import json,sys; print(json.dumps(json.load(open('/tmp/generate-output.json')).get('generated', [])))")
          # Merge generated lists
          GENERATED=$(python3 -c "import json,sys; a=json.loads(sys.argv[1]); b=json.loads(sys.argv[2]); print(json.dumps(list(set(a+b))))" "$GENERATED" "$HARBOR_GENERATED")
        fi

        echo "$GENERATED" > "$(results.generated-files.path)"
        echo "Generated files: $GENERATED"
