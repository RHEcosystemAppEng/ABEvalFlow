apiVersion: batch/v1
kind: CronJob
metadata:
  name: abevalflow-monitoring
  namespace: ab-eval-flow
  labels:
    app.kubernetes.io/name: abevalflow
    app.kubernetes.io/component: monitoring
spec:
  # Scheduled trigger only — runs every 10 days at 6:00 AM UTC
  schedule: "0 6 */10 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: abevalflow
            app.kubernetes.io/component: monitoring-job
        spec:
          serviceAccountName: pipeline
          restartPolicy: Never
          containers:
            - name: trigger-evaluations
              image: registry.redhat.io/openshift4/ose-cli:latest
              envFrom:
                - secretRef:
                    name: monitoring-slack-webhook
                    optional: true
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
              command:
                - /bin/bash
                - -c
                - |
                  set -e

                  echo "=== ABEvalFlow Monitoring CronJob ==="
                  echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

                  # ── Helpers ──────────────────────────────────────────────
                  send_slack() {
                    local msg="$1"
                    if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
                      curl -s -X POST -H 'Content-type: application/json' \
                        --data "{\"text\":\"$msg\"}" "$SLACK_WEBHOOK_URL" || true
                    fi
                    echo "SLACK: $msg"
                  }

                  # Create a PipelineRun for a canary skill (Harbor/ASE/A2A)
                  trigger_pipeline_run() {
                    local skill="$1"
                    local repo_url="$2"
                    local path_val="$3"
                    local engine="$4"
                    local trials="$5"
                    local threshold="$6"
                    local agent_endpoint="$7"   # only for a2a
                    local run_name="${8:-}"      # override generateName suffix

                    local run_suffix="${run_name:-$(date +%s)}"
                    local PIPELINE_RUN_NAME="monitoring-${skill}-${run_suffix}"

                    echo "  Triggering PipelineRun: $PIPELINE_RUN_NAME (engine=$engine)"

                    local agent_param=""
                    if [ -n "$agent_endpoint" ]; then
                      agent_param="
                      - name: agent-endpoint
                        value: \"${agent_endpoint}\""
                    fi

                    cat <<EOF | oc create -f -
                  apiVersion: tekton.dev/v1
                  kind: PipelineRun
                  metadata:
                    name: ${PIPELINE_RUN_NAME}
                    namespace: ${NAMESPACE}
                    labels:
                      abevalflow.monitoring: "true"
                      abevalflow.skill: "${skill}"
                  spec:
                    pipelineRef:
                      name: abevalflow-monitoring-pipeline
                    params:
                      - name: repo-url
                        value: "${repo_url}"
                      - name: revision
                        value: "main"
                      - name: submission-dir
                        value: "${path_val}"
                      - name: pipeline-repo-revision
                        value: "main"
                      - name: eval-engine
                        value: "${engine}"
                      - name: ase-iterations
                        value: "${trials}"
                      - name: degradation-threshold
                        value: "${threshold}"${agent_param}
                    timeouts:
                      pipeline: "2h"
                      tasks: "1h30m"
                    taskRunTemplate:
                      serviceAccountName: pipeline
                    workspaces:
                      - name: shared-workspace
                        volumeClaimTemplate:
                          spec:
                            accessModes:
                              - ReadWriteOnce
                            resources:
                              requests:
                                storage: 1Gi
                  EOF
                    echo "  Created PipelineRun: $PIPELINE_RUN_NAME"
                  }

                  # ── Load canary pack config ───────────────────────────────
                  CONFIG=$(oc get configmap monitoring-canary-pack -o jsonpath='{.data.config\.yaml}')

                  # ── Process each canary skill ─────────────────────────────
                  SKILLS=$(echo "$CONFIG" | grep -A 2 "^      - name:" | grep "name:" | sed 's/.*name: //' | tr -d ' ')

                  if [ -z "$SKILLS" ]; then
                    echo "No skills found in canary pack config"
                    exit 0
                  fi

                  echo ""
                  echo "Skills in canary pack: $(echo $SKILLS | tr '\n' ' ')"

                  for SKILL in $SKILLS; do
                    echo ""
                    echo "━━━ Skill: $SKILL ━━━"

                    REPO=$(echo "$CONFIG" | grep -A 12 "name: $SKILL" | grep "repo:" | head -1 | sed 's/.*repo: //' | tr -d ' ')
                    PATH_VAL=$(echo "$CONFIG" | grep -A 12 "name: $SKILL" | grep "path:" | head -1 | sed 's/.*path: //' | tr -d ' ')
                    ENGINE=$(echo "$CONFIG" | grep -A 12 "name: $SKILL" | grep "eval_engine:" | head -1 | sed 's/.*eval_engine: //' | tr -d ' ')
                    TRIALS=$(echo "$CONFIG" | grep -A 12 "name: $SKILL" | grep "trials:" | head -1 | sed 's/.*trials: //' | tr -d ' ')
                    THRESHOLD=$(echo "$CONFIG" | grep -A 12 "name: $SKILL" | grep "threshold:" | head -1 | sed 's/.*threshold: //' | tr -d ' ')
                    IMAGE=$(echo "$CONFIG" | grep -A 12 "name: $SKILL" | grep "image:" | head -1 | sed 's/.*image: //' | tr -d ' ')
                    AGENT_ENDPOINT=$(echo "$CONFIG" | grep -A 12 "name: $SKILL" | grep "agent_endpoint:" | head -1 | sed 's/.*agent_endpoint: //' | tr -d ' ')

                    if [ -z "$REPO" ] || [ -z "$PATH_VAL" ] || [ -z "$ENGINE" ]; then
                      echo "  ERROR: Missing required fields for $SKILL (repo=$REPO, path=$PATH_VAL, engine=$ENGINE)"
                      continue
                    fi

                    REPO_URL="https://github.com/${REPO}.git"
                    TRIALS="${TRIALS:-5}"
                    THRESHOLD="${THRESHOLD:-0.80}"

                    # ── A2A skills: health check then trigger scheduled run ──
                    if [ "$ENGINE" = "a2a" ]; then
                      echo "  Engine: a2a — running scheduled 10-day evaluation"

                      HEALTH_ENDPOINT="${AGENT_ENDPOINT}/.well-known/agent.json"
                      HTTP_STATUS=$(curl -sf --max-time 10 -o /dev/null -w "%{http_code}" "$HEALTH_ENDPOINT" 2>/dev/null || echo "000")

                      if [ "$HTTP_STATUS" != "200" ]; then
                        echo "  ERROR: Agent health check FAILED (endpoint=$HEALTH_ENDPOINT, status=$HTTP_STATUS)"
                        send_slack ":red_circle: *ABEvalFlow Monitoring* — ${SKILL} health check failed (HTTP $HTTP_STATUS). Skipping eval."
                        continue
                      fi
                      echo "  Agent health check PASSED (HTTP $HTTP_STATUS)"

                      trigger_pipeline_run \
                        "$SKILL" "$REPO_URL" "$PATH_VAL" "$ENGINE" \
                        "$TRIALS" "$THRESHOLD" "$AGENT_ENDPOINT" \
                        "scheduled-$(date +%s)"

                    else
                      # ── Non-A2A skills (harbor, ase): always trigger on schedule ──
                      echo "  Engine: $ENGINE — triggering scheduled run"
                      trigger_pipeline_run \
                        "$SKILL" "$REPO_URL" "$PATH_VAL" "$ENGINE" \
                        "$TRIALS" "$THRESHOLD" "" ""
                    fi
                  done

                  echo ""
                  echo "=== Monitoring CronJob complete ==="
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: config
              configMap:
                name: monitoring-canary-pack
