apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-canary-pack
  namespace: ab-eval-flow
  labels:
    app.kubernetes.io/name: abevalflow
    app.kubernetes.io/component: monitoring
data:
  config.yaml: |
    # Monitoring configuration for continuous performance tracking
    # Edit this file to add/remove skills from the canary pack
    #
    # NOTE: Canary skills should eventually be moved to a dedicated location
    # (separate repo or branch) since they are persistent baselines, not
    # one-time submissions. Current PRs used as placeholders:
    #   - PR #88: mcp-lightspeed-validator
    #   - PR #17: (can be reopened)
    #
    # Each skill must specify:
    #   - name: unique identifier
    #   - repo: GitHub repository (org/repo)
    #   - path: submission directory path
    #   - eval_engine: harbor or ase
    #   - trials: number of evaluation trials
    #   - threshold: alert if current_score/previous_score < threshold

    skills:
      # MCP Lightspeed Validator - PR #88
      - name: mcp-lightspeed-validator
        repo: RHEcosystemAppEng/skill-submissions
        path: submissions/rh-sre-mcp-lightspeed-validator
        eval_engine: harbor
        trials: 20
        threshold: 0.85
