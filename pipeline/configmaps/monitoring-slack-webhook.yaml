apiVersion: v1
kind: Secret
metadata:
  name: monitoring-slack-webhook
  namespace: ab-eval-flow
  labels:
    app.kubernetes.io/name: abevalflow
    app.kubernetes.io/component: monitoring
type: Opaque
stringData:
  # Replace with your Slack Incoming Webhook URL
  # To create a webhook:
  # 1. Go to https://api.slack.com/apps
  # 2. Create or select an app
  # 3. Enable "Incoming Webhooks"
  # 4. Add a new webhook to your workspace
  # 5. Copy the webhook URL here
  webhook-url: "https://hooks.slack.com/services/REPLACE/WITH/ACTUAL_WEBHOOK"
