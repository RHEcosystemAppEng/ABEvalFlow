apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: oracle-test-
  namespace: ab-eval-flow
spec:
  taskSpec:
    workspaces:
      - name: source
    steps:
      - name: clone-and-setup
        image: registry.access.redhat.com/ubi9/python-311:9.6
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          WORKSPACE="$(workspaces.source.path)"
          cd "$WORKSPACE"

          # Clone the pipeline repo (which also has the example submission)
          git clone --depth 1 --branch APPENG-4909/ai-assisted-eval \
            https://github.com/RHEcosystemAppEng/ABEvalFlow.git _pipeline

          # Symlink example as a "submission" so the generate script finds it
          mkdir -p submissions
          ln -s "$WORKSPACE/_pipeline/examples/sample_skill_ai" submissions/sample-skill-ai

          echo "Setup complete"
          ls -la submissions/sample-skill-ai/

      - name: generate-oracle
        image: registry.access.redhat.com/ubi9/python-311:9.6
        env:
          - name: AGENT_TYPE
            value: "oracle"
          - name: MINIO_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: endpoint-url
                optional: true
          - name: MINIO_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: root-user
                optional: true
          - name: MINIO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: root-password
                optional: true
          - name: PIPELINE_RUN_ID
            value: "oracle-test"
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
          SUBMISSION_PATH="$(workspaces.source.path)/submissions/sample-skill-ai"

          cd "$PIPELINE_DIR"
          pip install --quiet --no-cache-dir pydantic pyyaml openai minio pytest
          export PYTHONPATH="$PIPELINE_DIR"

          python scripts/generate_tests.py "$SUBMISSION_PATH" \
            --workspace-dir "$(workspaces.source.path)" \
            --agent-type oracle \
            --max-retries 1

          echo "---"
          echo "Generated files:"
          ls -la "$SUBMISSION_PATH/instruction.md" "$SUBMISSION_PATH/tests/" 2>/dev/null || true

      - name: verify-minio
        image: registry.access.redhat.com/ubi9/python-311:9.6
        env:
          - name: MINIO_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: endpoint-url
          - name: MINIO_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: root-user
          - name: MINIO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: root-password
        script: |
          #!/usr/bin/env bash
          set -euo pipefail
          pip install --quiet --no-cache-dir minio
          python3 -c "
          import os
          from minio import Minio

          endpoint = os.environ['MINIO_ENDPOINT'].replace('http://','').replace('https://','')
          client = Minio(endpoint, os.environ['MINIO_ACCESS_KEY'], os.environ['MINIO_SECRET_KEY'], secure=False)

          bucket = 'ab-eval-reports'
          print(f'Listing objects in {bucket}:')
          for obj in client.list_objects(bucket, prefix='', recursive=True):
              if 'generated/' in obj.object_name:
                  print(f'  {obj.object_name}  ({obj.size} bytes)')
          "
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
