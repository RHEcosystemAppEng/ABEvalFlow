apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: abevalflow-oracle-
  namespace: ab-eval-flow
spec:
  pipelineRef:
    name: abevalflow-pipeline
  params:
    - name: repo-url
      value: "https://github.com/RHEcosystemAppEng/skill-submissions.git"
    - name: revision
      value: "4d3efc82ed9063407875ee50ddecdbcb9d0d4388"
    - name: submission-dir
      value: "sample-skill-ai"
    - name: pipeline-repo-url
      value: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
    - name: pipeline-repo-revision
      value: "APPENG-4909/ai-assisted-eval"
    - name: enable-ai-generation
      value: "true"
    - name: agent-type
      value: "oracle"
    - name: repo-name
      value: "RHEcosystemAppEng/skill-submissions"
    - name: pr-number
      value: "2"
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
